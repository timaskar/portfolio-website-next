<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tamirlan Askar - Loading Prototype</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23111111'/%3E%3Crect x='4' y='6' width='3' height='2' fill='%23F2F2EE'/%3E%3Crect x='9' y='6' width='3' height='2' fill='%23F2F2EE'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        --bg-page: #000000;
        --bg-panel: #090909;
        --text-primary: #f2f2ee;
        --text-secondary: #a6a6a0;
        --text-muted: #70706a;
        --border-subtle: #252521;
        --border-default: #34342e;
        --signal-active: #9fffd7;
        --signal-dim: #4fd6b0;
        --glass-fill: rgba(255, 255, 255, 0.075);
        --glass-fill-strong: rgba(255, 255, 255, 0.11);
        --glass-border: rgba(255, 255, 255, 0.15);
        --glass-shine: rgba(255, 255, 255, 0.22);
        --pixel: rgba(242, 242, 238, 0.82);
        --pixel-dim: rgba(242, 242, 238, 0.18);
        --scan: rgba(242, 242, 238, 0.055);
        --shadow: rgba(0, 0, 0, 0.56);
        --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-in: cubic-bezier(0.7, 0, 0.84, 0);
        --ease-mascot: cubic-bezier(0.45, 0, 0.2, 1);
        font-family: Inter, Manrope, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text-primary);
        background: var(--bg-page);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: var(--bg-page);
      }

      body {
        overflow-x: hidden;
      }

      button,
      a {
        font: inherit;
      }

      .site-shell {
        min-height: 100vh;
        position: relative;
        isolation: isolate;
        overflow-x: hidden;
        background: var(--bg-page);
      }

      .loader {
        position: relative;
        z-index: 20;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg-page);
        overflow: hidden;
      }

      .loader::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        z-index: 1;
        height: 46%;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.94));
        pointer-events: none;
      }

      .loader-video {
        position: absolute;
        inset: 0;
        z-index: 2;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
        pointer-events: none;
        animation: loader-video-exit 260ms linear 5s forwards;
      }

      .mascot-hold {
        position: absolute;
        left: 50%;
        top: calc(50% - 212px);
        z-index: 3;
        display: grid;
        place-items: center;
        width: min(238px, 27vw);
        aspect-ratio: 512 / 320;
        border: 0;
        padding: 0;
        background: transparent;
        opacity: 0;
        transform: translate3d(-50%, 10px, 0) scale(0.94);
        cursor: pointer;
        animation: mascot-hold-enter 520ms var(--ease-out) 5s forwards;
      }

      .mascot-hold:focus-visible {
        outline: 0;
      }

      .mascot-video {
        position: absolute;
        left: 50%;
        top: 50%;
        display: block;
        width: 200%;
        height: 200%;
        object-fit: contain;
        background: #000;
        mix-blend-mode: screen;
        -webkit-mask-image: radial-gradient(
          ellipse 44% 38% at 50% 50%,
          #000 0,
          #000 48%,
          rgba(0, 0, 0, 0.58) 63%,
          transparent 80%
        );
        mask-image: radial-gradient(
          ellipse 44% 38% at 50% 50%,
          #000 0,
          #000 48%,
          rgba(0, 0, 0, 0.58) 63%,
          transparent 80%
        );
        pointer-events: none;
        filter: drop-shadow(0 0 28px rgba(242, 242, 238, 0.08));
        transform: translate(-50%, -50%);
      }

      .chat-mascot {
        --track-yaw: 0deg;
        --track-pitch: 0deg;
        --track-x: 0px;
        --track-y: 0px;
        --track-eye-x: 0px;
        --track-eye-y: 0px;
        --track-skew: 0deg;
        --track-brow-left-y: 0px;
        --track-brow-right-y: 0px;
        --track-brow-left-rot: 4deg;
        --track-brow-right-rot: -4deg;
        --track-eye-scale-y: 1;
        --track-eye-scale-x: 0.96;
        --squint-face-pitch: 10deg;
        --squint-y: 5px;
        --squint-eye-y: 6px;
        --squint-brow-left-y: 5px;
        --squint-brow-right-y: 5px;
        --squint-brow-left-rot: -2deg;
        --squint-brow-right-rot: 2deg;
      }

      .chat-face {
        position: relative;
        width: 100%;
        height: 100%;
        transform-origin: 50% 58%;
        transition: transform 520ms var(--ease-out);
        will-change: transform;
      }

      .chat-eye,
      .chat-brow {
        position: absolute;
        display: grid;
        align-content: center;
        justify-content: center;
        transform-origin: 50% 50%;
        transition:
          opacity 320ms var(--ease-out),
          transform 520ms var(--ease-out),
          filter 420ms var(--ease-out);
        will-change: transform, opacity;
      }

      .chat-eye {
        top: 47%;
        width: 36px;
        height: 74px;
        grid-template-columns: repeat(5, 4px);
        grid-auto-rows: 4px;
        gap: 2px;
        border-radius: 5px;
        translate: 0 -50%;
        filter:
          drop-shadow(0 0 8px rgba(242, 242, 238, 0.44))
          drop-shadow(0 0 22px rgba(242, 242, 238, 0.2));
      }

      .chat-eye-left {
        left: 21.1%;
      }

      .chat-eye-right {
        right: 21.1%;
      }

      .chat-brow {
        top: -27%;
        width: 57px;
        height: 19px;
        grid-template-columns: repeat(8, 4px);
        grid-auto-rows: 4px;
        gap: 2px;
        opacity: 0.86;
        filter:
          drop-shadow(0 0 8px rgba(242, 242, 238, 0.3))
          drop-shadow(0 0 18px rgba(242, 242, 238, 0.12));
      }

      .chat-brow-left {
        left: 8.5%;
        transform: translate3d(0, 0, 0) rotateZ(4deg);
      }

      .chat-brow-right {
        right: 8.5%;
        transform: translate3d(0, 0, 0) rotateZ(-4deg);
      }

      .chat-led {
        display: grid;
        place-items: center;
        width: 4px;
        height: 4px;
        border-radius: 1px;
        background: rgba(242, 242, 238, calc(var(--o, 0.82) * 0.16));
        color: rgba(242, 242, 238, 0.9);
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: 5.4px;
        font-weight: 800;
        line-height: 1;
        text-shadow:
          0 0 5px rgba(242, 242, 238, 0.62),
          0 0 14px rgba(242, 242, 238, 0.24);
        box-shadow:
          0 0 4px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.72)),
          0 0 13px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.34)),
          0 0 28px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.14));
        transition:
          opacity 70ms linear,
          color 70ms linear,
          background-color 70ms linear,
          text-shadow 70ms linear,
          box-shadow 70ms linear;
      }

      .chat-brow .chat-led {
        opacity: 0.82;
      }

      .chat-mascot[data-state="idle-left"] .chat-face {
        transform: perspective(520px) rotateY(-8deg) translateX(-4px);
      }

      .chat-mascot[data-state="idle-right"] .chat-face {
        transform: perspective(520px) rotateY(8deg) translateX(4px);
      }

      .chat-mascot[data-state="idle-left"] .chat-eye {
        transform: translateX(-6px) skewY(-1.8deg) scaleX(0.94);
      }

      .chat-mascot[data-state="idle-right"] .chat-eye {
        transform: translateX(6px) skewY(1.8deg) scaleX(0.94);
      }

      .chat-mascot[data-state="sleepy"] .chat-face {
        transform: translateY(8px) scaleY(0.98);
      }

      .chat-mascot[data-state="sleepy"] .chat-eye {
        opacity: 0.74;
        transform: scaleY(0.08);
        filter:
          drop-shadow(0 0 5px rgba(242, 242, 238, 0.34))
          drop-shadow(0 0 15px rgba(242, 242, 238, 0.12));
      }

      .chat-mascot[data-state="track"] .chat-face {
        transform:
          perspective(520px)
          rotateY(var(--track-yaw))
          rotateX(var(--track-pitch))
          translate3d(var(--track-x), var(--track-y), 0);
        transition-duration: 170ms;
      }

      .chat-mascot[data-state="track"] .chat-eye {
        transform:
          translate3d(var(--track-eye-x), var(--track-eye-y), 0)
          skewY(var(--track-skew))
          scaleX(var(--track-eye-scale-x))
          scaleY(var(--track-eye-scale-y));
        transition-duration: 170ms;
      }

      .chat-mascot[data-state="track"] .chat-brow-left {
        transform:
          translate3d(0, var(--track-brow-left-y), 0)
          rotateZ(var(--track-brow-left-rot));
        transition-duration: 170ms;
      }

      .chat-mascot[data-state="track"] .chat-brow-right {
        transform:
          translate3d(0, var(--track-brow-right-y), 0)
          rotateZ(var(--track-brow-right-rot));
        transition-duration: 170ms;
      }

      .chat-mascot[data-state="look-input"] .chat-face {
        transform: perspective(520px) rotateX(8deg) translateY(6px);
      }

      .chat-mascot[data-state="look-input"] .chat-eye {
        transform: translateY(8px) scaleY(0.96);
      }

      .chat-mascot[data-state="squint"] .chat-face {
        transform:
          perspective(520px)
          rotateY(var(--track-yaw))
          rotateX(var(--squint-face-pitch))
          translate3d(var(--track-x), var(--squint-y), 0);
        transition-duration: 180ms;
      }

      .chat-mascot[data-state="squint"] .chat-eye {
        transform:
          translate3d(var(--track-eye-x), var(--squint-eye-y), 0)
          skewY(var(--track-skew))
          scaleX(1.04)
          scaleY(0.34);
        filter:
          drop-shadow(0 0 7px rgba(242, 242, 238, 0.42))
          drop-shadow(0 0 20px rgba(242, 242, 238, 0.16));
        transition-duration: 180ms;
      }

      .chat-mascot[data-state="squint"] .chat-brow-left {
        transform:
          translate3d(-3px, var(--squint-brow-left-y), 0)
          rotateZ(var(--squint-brow-left-rot));
        transition-duration: 180ms;
      }

      .chat-mascot[data-state="squint"] .chat-brow-right {
        transform:
          translate3d(3px, var(--squint-brow-right-y), 0)
          rotateZ(var(--squint-brow-right-rot));
        transition-duration: 180ms;
      }

      .chat-mascot[data-state="look-send"] .chat-face {
        transform: perspective(520px) rotateY(12deg) translate3d(8px, 4px, 0);
      }

      .chat-mascot[data-state="look-send"] .chat-eye {
        transform: translate3d(9px, 6px, 0) skewY(2deg) scaleX(0.92);
      }

      .chat-mascot[data-state="look-send"] .chat-brow-right {
        transform: translate3d(6px, -9px, 0) rotateZ(-10deg);
      }

      .chat-mascot[data-state="startled"] .chat-face {
        animation: mascot-startle 720ms var(--ease-out);
      }

      .chat-mascot[data-state="startled"] .chat-eye {
        transform: scaleX(1.08) scaleY(1.14);
        filter:
          drop-shadow(0 0 10px rgba(242, 242, 238, 0.6))
          drop-shadow(0 0 30px rgba(242, 242, 238, 0.24));
      }

      .chat-mascot[data-state="startled"] .chat-brow-left {
        transform: translate3d(-8px, -13px, 0) rotateZ(-10deg);
      }

      .chat-mascot[data-state="startled"] .chat-brow-right {
        transform: translate3d(8px, -13px, 0) rotateZ(10deg);
      }

      .chat-mascot.is-blinking .chat-eye {
        animation: mascot-blink 260ms var(--ease-in);
      }

      .sleep-z {
        position: absolute;
        z-index: 4;
        top: -21%;
        right: 14%;
        color: rgba(242, 242, 238, 0.9);
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: 11px;
        font-weight: 950;
        line-height: 1;
        opacity: 0;
        -webkit-text-stroke: 0.35px rgba(242, 242, 238, 0.58);
        text-shadow:
          0 0 1px rgba(242, 242, 238, 0.8),
          0 0 8px rgba(242, 242, 238, 0.72),
          0 0 20px rgba(242, 242, 238, 0.3);
        transform: translate3d(0, 8px, 0) scale(0.82);
        pointer-events: none;
      }

      .sleep-z-two {
        top: -32%;
        right: 6%;
        font-size: 14px;
      }

      .sleep-z-three {
        top: -43%;
        right: -4%;
        font-size: 17px;
      }

      .chat-mascot[data-state="sleepy"] .sleep-z {
        animation: sleep-z 1.8s var(--ease-out) infinite;
      }

      .chat-mascot[data-state="sleepy"] .sleep-z-two {
        animation-delay: 180ms;
      }

      .chat-mascot[data-state="sleepy"] .sleep-z-three {
        animation-delay: 360ms;
      }

      .assistant-console {
        --console-y-start: calc(-50% + 18px);
        --console-y-end: -50%;
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 4;
        display: flex;
        flex-direction: column;
        width: min(560px, calc(100vw - 48px));
        opacity: 0;
        transform: translate3d(-50%, var(--console-y-start), 0);
        animation: console-enter 760ms var(--ease-out) 5.05s forwards;
        transition:
          top 620ms var(--ease-out),
          transform 620ms var(--ease-out),
          width 360ms var(--ease-out);
      }

      .assistant-console.has-user {
        top: calc(100% - clamp(28px, 5vh, 54px));
        transform: translate3d(-50%, -100%, 0);
        animation: none;
        opacity: 1;
      }

      .thread {
        display: grid;
        gap: 10px;
        order: 1;
        width: min(560px, 100%);
        margin: 0 auto 10px;
      }

      .assistant-console.has-user .thread {
        margin-bottom: 12px;
      }

      .message-row {
        display: flex;
        align-items: center;
      }

      .message-row[hidden] {
        display: none !important;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .message-row.agent {
        justify-content: center;
        text-align: center;
      }

      .message-bubble {
        position: relative;
        overflow: hidden;
        max-width: min(620px, 88%);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        padding: 16px 18px 17px;
        background: var(--glass-fill);
        -webkit-backdrop-filter: blur(30px) saturate(1.35);
        backdrop-filter: blur(30px) saturate(1.35);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.11),
          inset 0 -1px 0 rgba(255, 255, 255, 0.035),
          0 18px 58px rgba(0, 0, 0, 0.28);
      }

      .message-bubble::before,
      .composer::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 38%),
          radial-gradient(circle at 88% 12%, rgba(255, 255, 255, 0.13), transparent 28%);
        opacity: 0.72;
      }

      .message-bubble > * {
        position: relative;
      }

      .agent-bubble {
        max-width: min(760px, 100%);
        border: 0;
        border-radius: 0;
        padding: 0 12px;
        background: transparent;
        -webkit-backdrop-filter: none;
        backdrop-filter: none;
        box-shadow: none;
      }

      .agent-bubble::before {
        content: none;
      }

      .assistant-console.has-user .message-row.agent {
        justify-content: flex-start;
        text-align: left;
      }

      .assistant-console.has-user .agent-bubble {
        max-width: min(560px, 100%);
        border: 0;
        border-radius: 0;
        padding: 0 4px;
        background: transparent;
        -webkit-backdrop-filter: none;
        backdrop-filter: none;
        box-shadow: none;
      }

      .assistant-console.has-user .agent-bubble::before {
        content: none;
      }

      .user-bubble {
        border-color: rgba(221, 255, 244, 0.24);
        border-bottom-right-radius: 12px;
        background: rgba(225, 255, 246, 0.13);
        color: var(--text-primary);
      }

      .agent-name,
      .followup,
      .send-button {
        font-weight: 650;
      }

      .agent-name {
        display: none;
        margin-bottom: 9px;
        color: rgba(242, 242, 238, 0.56);
        font-size: 13px;
        letter-spacing: 0;
        line-height: 1.3;
      }

      .agent-name::before {
        content: none;
      }

      .assistant-console.has-user .agent-name {
        display: none;
      }

      .agent-message {
        margin: 0;
        color: var(--text-primary);
        font-size: clamp(28px, 3.6vw, 42px);
        font-weight: 620;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .assistant-console.has-user .agent-message {
        font-size: 14px;
        font-weight: 500;
        line-height: 1.45;
      }

      .user-message {
        margin: 0;
        font-size: 14px;
        line-height: 1.45;
      }

      .followups {
        display: flex;
        flex-wrap: nowrap;
        gap: 7px;
        order: 3;
        width: min(560px, 100%);
        margin: 9px auto 0;
        padding: 0 0 7px;
        overflow-x: auto;
        overscroll-behavior-inline: contain;
        scrollbar-width: none;
      }

      .assistant-console.has-user .followups {
        order: 2;
        margin: 0 auto 10px;
      }

      .followups.has-overflow.is-at-start {
        -webkit-mask-image: linear-gradient(
          90deg,
          #000 0,
          #000 calc(100% - 26px),
          transparent 100%
        );
        mask-image: linear-gradient(
          90deg,
          #000 0,
          #000 calc(100% - 26px),
          transparent 100%
        );
      }

      .followups.has-overflow.is-at-end {
        -webkit-mask-image: linear-gradient(
          90deg,
          transparent 0,
          #000 18px,
          #000 100%
        );
        mask-image: linear-gradient(
          90deg,
          transparent 0,
          #000 18px,
          #000 100%
        );
      }

      .followups.has-overflow:not(.is-at-start):not(.is-at-end) {
        -webkit-mask-image: linear-gradient(
          90deg,
          transparent 0,
          #000 18px,
          #000 calc(100% - 26px),
          transparent 100%
        );
        mask-image: linear-gradient(
          90deg,
          transparent 0,
          #000 18px,
          #000 calc(100% - 26px),
          transparent 100%
        );
      }

      .followups::-webkit-scrollbar {
        display: none;
      }

      .followup {
        display: grid;
        flex: 0 0 auto;
        grid-template-columns: minmax(0, 1fr) 20px;
        align-items: center;
        min-height: 36px;
        min-width: 0;
        max-width: 230px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        padding: 7px 9px 7px 13px;
        background: rgba(255, 255, 255, 0.055);
        -webkit-backdrop-filter: blur(22px) saturate(1.22);
        backdrop-filter: blur(22px) saturate(1.22);
        color: rgba(242, 242, 238, 0.76);
        font-size: 14px;
        letter-spacing: 0;
        line-height: 1.2;
        text-align: left;
        cursor: pointer;
        transition:
          border-color 160ms var(--ease-out),
          background 160ms var(--ease-out),
          color 160ms var(--ease-out),
          box-shadow 160ms var(--ease-out);
      }

      .followup.is-used {
        display: none;
      }

      .followup:hover,
      .followup:focus-visible,
      .followup.is-active {
        border-color: rgba(230, 255, 248, 0.32);
        background: rgba(230, 255, 248, 0.12);
        color: var(--text-primary);
        outline: none;
        box-shadow: 0 0 28px rgba(230, 255, 248, 0.1);
      }

      .followup-text {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .followup-arrow {
        display: grid;
        place-items: center;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        color: rgba(242, 242, 238, 0.68);
        background: rgba(255, 255, 255, 0.06);
        transition:
          background 160ms var(--ease-out),
          color 160ms var(--ease-out),
          transform 160ms var(--ease-out);
      }

      .followup:hover .followup-arrow,
      .followup:focus-visible .followup-arrow,
      .followup.is-active .followup-arrow {
        color: var(--text-primary);
        background: rgba(255, 255, 255, 0.12);
        transform: translateX(2px);
      }

      .composer {
        position: relative;
        overflow: hidden;
        display: grid;
        order: 2;
        width: min(560px, 100%);
        margin: 0 auto;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: end;
        gap: 8px;
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        padding: 6px 6px 6px 17px;
        background: var(--glass-fill-strong);
        -webkit-backdrop-filter: blur(34px) saturate(1.42);
        backdrop-filter: blur(34px) saturate(1.42);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.13),
          inset 0 -1px 0 rgba(255, 255, 255, 0.035),
          0 24px 80px rgba(0, 0, 0, 0.34);
      }

      .assistant-console.has-user .composer {
        order: 3;
      }

      .composer > * {
        position: relative;
      }

      .prompt-input {
        width: 100%;
        height: 40px;
        border: 0;
        padding: 0 2px;
        background: transparent;
        color: var(--text-primary);
        font: inherit;
        font-size: 14px;
        line-height: 40px;
        letter-spacing: 0;
        outline: none;
      }

      .prompt-input::placeholder {
        color: rgba(242, 242, 238, 0.44);
      }

      .send-button {
        display: grid;
        place-items: center;
        width: 40px;
        min-width: 40px;
        height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.11);
        -webkit-backdrop-filter: blur(18px) saturate(1.18);
        backdrop-filter: blur(18px) saturate(1.18);
        color: var(--text-primary);
        cursor: pointer;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.14),
          0 0 24px rgba(255, 255, 255, 0.06);
        transition:
          background 160ms var(--ease-out),
          border-color 160ms var(--ease-out),
          box-shadow 160ms var(--ease-out);
      }

      .send-button:hover,
      .send-button:focus-visible {
        border-color: rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.16);
        outline: none;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          0 0 30px rgba(255, 255, 255, 0.1);
      }

      .send-icon {
        width: 16px;
        height: 16px;
      }

      .face-stage {
        position: relative;
        z-index: 2;
        width: min(58vw, 620px);
        aspect-ratio: 1 / 0.72;
        display: grid;
        place-items: center;
        animation: face-hide 4.85s steps(1, end) forwards;
      }

      .pixel-face {
        --eye-shift: 0px;
        position: relative;
        width: min(28vw, 260px);
        height: min(16vw, 148px);
        z-index: 2;
        transform-origin: 50% 50%;
        will-change: transform, opacity;
        animation: mascot-look 4.85s var(--ease-mascot) forwards;
      }

      .eye {
        position: absolute;
        top: 50%;
        width: 46px;
        height: 96px;
        border-radius: 5px;
        opacity: 0.92;
        display: grid;
        grid-template-columns: repeat(5, 5px);
        grid-auto-rows: 5px;
        align-content: center;
        justify-content: center;
        gap: 3px;
        overflow: hidden;
        transform-origin: 50% 50%;
        translate: 0 -50%;
        filter:
          drop-shadow(0 0 8px rgba(242, 242, 238, 0.34))
          drop-shadow(0 0 22px rgba(242, 242, 238, 0.16));
        will-change: transform, opacity;
        z-index: 2;
      }

      .eye-dot {
        display: grid;
        place-items: center;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(242, 242, 238, var(--o, 0.82));
        color: transparent;
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: 7px;
        font-weight: 700;
        line-height: 1;
        box-shadow:
          0 0 4px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.82)),
          0 0 12px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.44)),
          0 0 24px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.18));
      }

      .eye.is-booting .eye-dot {
        border-radius: 1px;
        background: rgba(242, 242, 238, 0.08);
        color: rgba(242, 242, 238, 0.96);
        box-shadow:
          0 0 5px rgba(242, 242, 238, 0.52),
          0 0 14px rgba(242, 242, 238, 0.2);
        text-shadow:
          0 0 5px rgba(242, 242, 238, 0.58),
          0 0 13px rgba(242, 242, 238, 0.24);
      }

      .eye-left {
        left: 22%;
        animation: eye-shape 4.85s var(--ease-mascot) forwards;
      }

      .eye-right {
        right: 22%;
        animation: eye-shape 4.85s var(--ease-mascot) forwards;
      }

      .eye-left .eye-dot {
        animation: led-power-left 4.85s linear forwards;
      }

      .eye-right .eye-dot {
        animation: led-power-right 4.85s linear forwards;
      }

      .eye-glow {
        position: absolute;
        top: 50%;
        width: 98px;
        height: 150px;
        translate: 0 -50%;
        z-index: 1;
        opacity: 0;
        pointer-events: none;
        border-radius: 999px;
        background: radial-gradient(
          ellipse at center,
          rgba(242, 242, 238, 0.38) 0%,
          rgba(242, 242, 238, 0.2) 28%,
          rgba(242, 242, 238, 0.08) 52%,
          transparent 76%
        );
        filter: blur(13px);
        transform-origin: 50% 50%;
        animation: eye-glow-bloom 4.85s var(--ease-mascot) forwards;
      }

      .glow-left {
        left: calc(22% - 26px);
      }

      .glow-right {
        right: calc(22% - 26px);
      }

      .brow {
        position: absolute;
        top: -18%;
        width: 62px;
        height: 18px;
        display: grid;
        grid-template-columns: repeat(7, 5px);
        grid-auto-rows: 5px;
        align-content: center;
        justify-content: center;
        gap: 3px;
        opacity: 0.66;
        filter: drop-shadow(0 0 8px rgba(242, 242, 238, 0.08));
        will-change: transform, opacity;
        z-index: 3;
      }

      .brow-left {
        left: 10%;
        animation: brow-left-lift 4.85s var(--ease-mascot) forwards;
      }

      .brow-right {
        right: 10%;
        animation: brow-right-lift 4.85s var(--ease-mascot) forwards;
      }

      .brow-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(242, 242, 238, var(--o, 0.58));
        box-shadow: 0 0 5px rgba(242, 242, 238, calc(var(--o, 0.58) * 0.16));
      }

      .boot-log {
        position: absolute;
        left: 50%;
        top: calc(50% + min(17vw, 172px));
        translate: -50% 0;
        z-index: 3;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 24ch minmax(0, 1fr);
        align-items: center;
        column-gap: 12px;
        width: min(560px, calc(100vw - 32px));
        min-width: 0;
        overflow: visible;
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: clamp(10px, 1.45vw, 13px);
        line-height: 1.4;
        letter-spacing: 0.055em;
        text-transform: uppercase;
        color: var(--text-primary);
        animation: boot-log-exit 4.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .boot-log::after {
        content: "";
        grid-column: 3;
      }

      .boot-kicker {
        grid-column: 1;
        justify-self: end;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text-muted);
      }

      .boot-led {
        flex: 0 0 auto;
        width: 6px;
        height: 6px;
        background: rgba(159, 255, 215, 0.8);
        border-radius: 50%;
        box-shadow:
          0 0 8px rgba(159, 255, 215, 0.46),
          0 0 18px rgba(159, 255, 215, 0.16);
        animation: status-led 4.85s steps(2, end) forwards;
      }

      .boot-label {
        flex: 0 0 auto;
      }

      .boot-status {
        grid-column: 2;
        position: relative;
        width: 24ch;
        height: 1.4em;
        overflow: hidden;
        text-align: center;
      }

      .status-text {
        position: absolute;
        inset: 0;
        opacity: 0;
        white-space: nowrap;
        text-align: center;
        transform: translateY(5px);
        animation: status-step 940ms var(--ease-out) var(--delay) forwards;
      }

      .status-text.final {
        font-weight: 700;
        letter-spacing: 0.08em;
        text-shadow:
          0 0 10px rgba(242, 242, 238, 0.42),
          0 0 24px rgba(242, 242, 238, 0.18);
        animation: status-final 1.8s var(--ease-out) var(--delay) forwards;
      }

      .reveal {
        min-height: 100vh;
        position: relative;
        z-index: 1;
        display: grid;
        align-items: end;
        padding: clamp(24px, 5vw, 80px);
        opacity: 0;
        transform: translateY(18px);
        animation: site-reveal 900ms cubic-bezier(0.22, 1, 0.36, 1) 4.72s forwards;
      }

      .reveal-content {
        position: relative;
        z-index: 2;
        width: min(980px, 100%);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
        margin: 0 0 24px;
        color: var(--text-muted);
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: 11px;
        line-height: 1.4;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .meta span {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .meta span::before {
        content: "";
        width: 5px;
        height: 5px;
        background: var(--signal-active);
        box-shadow: 0 0 16px rgba(159, 255, 215, 0.24);
      }

      h1 {
        max-width: 900px;
        margin: 0;
        font-size: clamp(52px, 9vw, 126px);
        line-height: 0.9;
        letter-spacing: 0;
        font-weight: 600;
      }

      .summary {
        max-width: 660px;
        margin: 28px 0 0;
        color: var(--text-secondary);
        font-size: clamp(17px, 2vw, 21px);
        line-height: 1.45;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 1px;
        width: min(980px, 100%);
        margin-top: clamp(40px, 8vw, 88px);
        border: 1px solid var(--border-subtle);
        background: var(--border-subtle);
      }

      .metric {
        min-height: 128px;
        padding: 20px;
        background: rgba(21, 21, 21, 0.9);
      }

      .metric strong {
        display: block;
        color: var(--text-primary);
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: clamp(28px, 4vw, 56px);
        line-height: 0.95;
        font-weight: 600;
        letter-spacing: 0;
      }

      .metric span {
        display: block;
        margin-top: 12px;
        color: var(--text-muted);
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: 11px;
        line-height: 1.4;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      @keyframes mascot-look {
        0% {
          opacity: 0;
          transform: translate3d(0, 14px, 0) scale(0.96) perspective(520px) rotateY(0deg) rotateZ(0deg);
        }
        10%,
        15% {
          opacity: 1;
          transform: translate3d(0, 0, 0) scale(1) perspective(520px) rotateY(0deg) rotateZ(0deg);
        }
        18% {
          transform: translate3d(-3px, 0, 0) scale(1) perspective(520px) rotateY(-4deg) rotateZ(0deg);
        }
        27%,
        41% {
          transform: translate3d(-16px, 0, 0) scale(1) perspective(520px) rotateY(-18deg) rotateZ(-0.35deg);
        }
        47% {
          transform: translate3d(6px, 0, 0) scale(1) perspective(520px) rotateY(7deg) rotateZ(0deg);
        }
        53%,
        64% {
          transform: translate3d(16px, 0, 0) scale(1) perspective(520px) rotateY(18deg) rotateZ(0.35deg);
        }
        69% {
          transform: translate3d(0, 0, 0) scale(1) perspective(520px) rotateY(0deg) rotateZ(0deg);
        }
        73% {
          transform: translate3d(0, 2px, 0) scaleX(1.02) scaleY(0.98) perspective(520px) rotateY(0deg) rotateZ(0deg);
        }
        79% {
          transform: translate3d(0, -7px, 0) scaleX(1.08) scaleY(1.04) perspective(520px) rotateY(0deg) rotateZ(0deg);
        }
        86% {
          opacity: 1;
          transform: translate3d(0, 68px, 0) scaleX(0.84) scaleY(0.3) perspective(520px) rotateY(0deg) rotateZ(0deg);
        }
        100% {
          opacity: 0;
          transform: translate3d(0, 124px, 0) scaleX(0.78) scaleY(0.18) perspective(520px) rotateY(0deg) rotateZ(0deg);
        }
      }

      @keyframes eye-shape {
        0% {
          opacity: 0;
          transform: scaleX(0.92) scaleY(0.05);
        }
        4% {
          opacity: 0.22;
          transform: scaleX(0.95) scaleY(0.08);
        }
        8% {
          opacity: 0.46;
          transform: scaleX(0.98) scaleY(0.18);
        }
        13% {
          opacity: 0.92;
          transform: scaleX(1.03) scaleY(1.04);
        }
        18%,
        69% {
          opacity: 0.9;
          transform: scaleX(1) scaleY(1);
        }
        75% {
          opacity: 1;
          transform: scaleX(1.12) scaleY(1.08);
        }
        82% {
          opacity: 0.7;
          transform: scaleX(1) scaleY(0.28);
        }
        86%,
        100% {
          opacity: 0.32;
          transform: scaleX(0.84) scaleY(0.1);
        }
      }

      @keyframes led-power-left {
        0%,
        2% {
          background: rgba(242, 242, 238, calc(var(--o, 0.82) * 0.06));
          box-shadow: none;
        }
        4%,
        6% {
          background: rgba(242, 242, 238, var(--o, 0.82));
          box-shadow:
            0 0 5px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.9)),
            0 0 16px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.54)),
            0 0 32px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.24));
        }
        8% {
          background: rgba(242, 242, 238, calc(var(--o, 0.82) * 0.22));
          box-shadow: 0 0 3px rgba(242, 242, 238, 0.08);
        }
        10% {
          background: rgba(242, 242, 238, var(--o, 0.82));
          box-shadow:
            0 0 5px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.82)),
            0 0 14px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.48)),
            0 0 28px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.2));
        }
        14%,
        100% {
          background: rgba(242, 242, 238, var(--o, 0.82));
          box-shadow:
            0 0 4px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.82)),
            0 0 12px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.44)),
            0 0 24px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.18));
        }
      }

      @keyframes led-power-right {
        0%,
        4% {
          background: rgba(242, 242, 238, calc(var(--o, 0.82) * 0.06));
          box-shadow: none;
        }
        6%,
        8% {
          background: rgba(242, 242, 238, var(--o, 0.82));
          box-shadow:
            0 0 5px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.9)),
            0 0 16px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.54)),
            0 0 32px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.24));
        }
        10% {
          background: rgba(242, 242, 238, calc(var(--o, 0.82) * 0.26));
          box-shadow: 0 0 3px rgba(242, 242, 238, 0.08);
        }
        12% {
          background: rgba(242, 242, 238, var(--o, 0.82));
          box-shadow:
            0 0 5px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.82)),
            0 0 14px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.48)),
            0 0 28px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.2));
        }
        15%,
        100% {
          background: rgba(242, 242, 238, var(--o, 0.82));
          box-shadow:
            0 0 4px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.82)),
            0 0 12px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.44)),
            0 0 24px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.18));
        }
      }

      @keyframes eye-glow-bloom {
        0% {
          opacity: 0;
          transform: scaleX(0.66) scaleY(0.12);
        }
        5% {
          opacity: 0.5;
          transform: scaleX(0.78) scaleY(0.2);
        }
        9% {
          opacity: 0.18;
          transform: scaleX(0.88) scaleY(0.34);
        }
        13% {
          opacity: 0.54;
          transform: scaleX(1.02) scaleY(0.86);
        }
        18%,
        41% {
          opacity: 0.46;
          transform: scaleX(1.08) scaleY(1);
        }
        47% {
          opacity: 0.22;
          transform: scaleX(0.92) scaleY(0.94);
        }
        53%,
        64% {
          opacity: 0.48;
          transform: scaleX(1.08) scaleY(1);
        }
        69% {
          opacity: 0.28;
          transform: scaleX(1) scaleY(0.95);
        }
        75% {
          opacity: 0.66;
          transform: scaleX(1.18) scaleY(1.08);
        }
        82% {
          opacity: 0.18;
          transform: scaleX(0.98) scaleY(0.32);
        }

        100% {
          opacity: 0;
          transform: scaleX(0.74) scaleY(0.1);
        }
      }

      @keyframes brow-left-lift {
        0%,
        16% {
          opacity: 0.52;
          transform: translate3d(0, 0, 0) rotateZ(0deg) scaleX(0.96);
        }
        18%,
        23% {
          opacity: 0.82;
          transform: translate3d(0, -20px, 0) rotateZ(0deg) scaleX(1.02);
        }
        24%,
        41% {
          opacity: 0.82;
          transform: translate3d(0, -20px, 0) rotateZ(0deg) scaleX(1.02);
        }
        47%,
        69% {
          opacity: 0.5;
          transform: translate3d(0, 0, 0) rotateZ(0deg) scaleX(0.96);
        }
        72%,
        79% {
          opacity: 0.88;
          transform: translate3d(0, -24px, 0) rotateZ(0deg) scaleX(1.02);
        }
        86%,
        100% {
          opacity: 0.2;
          transform: translate3d(0, 18px, 0) rotateZ(0deg) scaleX(0.8);
        }
      }

      @keyframes brow-right-lift {
        0%,
        41% {
          opacity: 0.48;
          transform: translate3d(0, 0, 0) rotateZ(0deg) scaleX(0.96);
        }
        45%,
        51% {
          opacity: 0.84;
          transform: translate3d(0, -20px, 0) rotateZ(0deg) scaleX(1.02);
        }
        52%,
        64% {
          opacity: 0.84;
          transform: translate3d(0, -20px, 0) rotateZ(0deg) scaleX(1.02);
        }
        68%,
        69% {
          opacity: 0.52;
          transform: translate3d(0, 0, 0) rotateZ(0deg) scaleX(0.96);
        }
        72%,
        79% {
          opacity: 0.88;
          transform: translate3d(0, -24px, 0) rotateZ(0deg) scaleX(1.02);
        }
        86%,
        100% {
          opacity: 0.2;
          transform: translate3d(0, 18px, 0) rotateZ(0deg) scaleX(0.8);

      @keyframes face-hide {
        0%,
        88% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      @keyframes status-step {

          opacity: 0;
          transform: translateY(5px);
        }
        16%,
        72% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateY(-4px);
        }
      }

      @keyframes status-final {
        0% {
          opacity: 0;
          transform: translateY(5px) scale(0.98);
        }
        14% {
          opacity: 1;
          transform: translateY(0) scale(1.045);
        }
        32%,
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes status-led {
        0%,
        8% {
          opacity: 0.18;
          transform: scale(0.7);
        }
        12%,
        72% {
          opacity: 1;
          transform: scale(1);
        }
        76%,
        100% {
          opacity: 0.76;
          transform: scale(0.86);
        }

      @keyframes boot-log-exit {

          transform: translateY(0) scale(1);

        34% {

        }

          transform: translate3d(5px, -3px, 0) scale(1);

      @media (max-width: 760px) {
        .face-stage {
          width: min(86vw, 460px);
        }

        .pixel-face {
          width: min(62vw, 320px);
          height: min(42vw, 210px);
        }

        .eye {
          width: 40px;
          height: 84px;
          grid-template-columns: repeat(5, 4px);
          grid-auto-rows: 4px;
          gap: 3px;
        }

        .eye-dot {
          width: 4px;
          height: 4px;
        }

        .brow {
          width: 52px;
          height: 16px;
          grid-template-columns: repeat(7, 4px);
          grid-auto-rows: 4px;
          gap: 3px;
        }

        .brow-dot {
          width: 4px;
          height: 4px;
        }

        .boot-log {
          top: calc(50% + 33vw);
          grid-template-columns: minmax(0, 1fr) 22ch minmax(0, 1fr);
          width: calc(100vw - 24px);
          max-width: calc(100vw - 24px);
          min-width: 0;
          column-gap: 6px;
          font-size: 9px;
        }

        .boot-kicker {
          gap: 5px;
        }

        .boot-led {
          width: 5px;
          height: 5px;
        }

        .boot-status {
          width: 22ch;
          flex-basis: 22ch;
        }

        .reveal {
          align-items: center;
          padding: 24px 16px;
        }

        .mascot-hold {
          top: clamp(214px, calc(30vh - 24px), 254px);
          width: min(190px, 48vw);
        }

        .assistant-console {
          --console-y-start: 18px;
          --console-y-end: 0px;
          top: clamp(388px, 47vh, 416px);
          width: calc(100vw - 32px);
        }

        .thread {
          gap: 8px;
          margin-bottom: 10px;
        }

        .assistant-console.has-user .thread {
          margin-bottom: 10px;
        }

        .message-bubble {
          max-width: 94%;
          border-radius: 24px;
          padding: 13px 14px 14px;
        }

        .agent-bubble {
          padding: 0 8px;
        }

        .assistant-console.has-user .agent-bubble {
          border-bottom-left-radius: 0;
          padding: 0 4px;
        }

        .user-bubble {
          border-bottom-right-radius: 8px;
        }

        .agent-message {
          font-size: 30px;
          line-height: 1.06;
        }

        .assistant-console.has-user .agent-message {
          font-size: 16px;
          line-height: 1.3;
        }

        .user-message {
          font-size: 14px;
        }

        .followups {
          display: grid;
          grid-template-columns: 1fr;
          gap: 7px;
          margin-top: 10px;
          padding: 0;
          overflow: visible;
          -webkit-mask-image: none;
          mask-image: none;
        }

        .followup {
          flex-basis: auto;
          width: 100%;
          max-width: none;
          min-height: 42px;
          border-radius: 21px;
          padding: 9px 10px 9px 14px;
          font-size: 14px;
        }

        .followup:nth-child(n + 5) {
          display: none;
        }

        .composer {
          grid-template-columns: minmax(0, 1fr) auto;
          gap: 8px;
          width: 100%;
          border-radius: 32px;
          padding: 8px 8px 8px 16px;
        }

        .prompt-input {
          height: 42px;
          padding: 8px 2px;
          font-size: 14px;
          line-height: 26px;
        }

        .send-button {
          width: 42px;
          min-width: 42px;
          height: 42px;
        }

        .send-icon {
          width: 16px;
          height: 16px;
        }

        .metrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .metric {
          min-height: 112px;
          padding: 16px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-delay: 0ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }

        .reveal {
          opacity: 1;
          transform: none;
        }

        .assistant-console {
          opacity: 1;
          transform: translate3d(-50%, var(--console-y-end), 0);
        }

        .mascot-hold {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="site-shell">
      <section class="loader" aria-label="Opening animation">
        <video
          class="loader-video"
          src="assets/loader-intro.mp4?v=chat-entry-2"
          autoplay
          muted
          playsinline
          preload="auto"
          aria-hidden="true"
        ></video>
        <button
          class="mascot-hold chat-mascot"
          type="button"
          data-state="sleep"
          aria-label="Wake Tim's portfolio assistant"
        >
          <video
            class="mascot-video"
            id="mascot-video"
            src="assets/mascot-sleep-loop.mp4?v=video-clips-4"
            autoplay
            muted
            loop
            playsinline
            preload="auto"
            aria-hidden="true"
          ></video>
        </button>
        <div class="assistant-console" aria-label="AI portfolio chat">
          <div class="thread" aria-live="polite">
            <div class="message-row user" id="user-message-row" hidden>
              <div class="message-bubble user-bubble">
                <p class="user-message" id="user-message"></p>
              </div>
            </div>
            <div class="message-row agent">
              <div class="message-bubble agent-bubble">
                <span class="agent-name">Assistant</span>
                <p class="agent-message" id="assistant-message">
                  Ask me about Tim
                </p>
              </div>
            </div>
          </div>
          <form class="composer" aria-label="Ask Tim's portfolio agent">
            <input
              class="prompt-input"
              id="portfolio-prompt"
              type="text"
              placeholder="Ask anything about Tim's work..."
            />
            <button class="send-button" type="submit" aria-label="Send prompt">
              <svg class="send-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 19V5m0 0-6 6m6-6 6 6"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2.4"
                />
              </svg>
            </button>
          </form>
          <div class="followups" aria-label="Suggested follow-up questions">
            <button
              class="followup"
              type="button"
              data-prompt="Which case should I open first?"
              data-response="Start with the case that best shows problem framing, shipped decisions, and measurable product impact."
            >
              <span class="followup-text">What should I see first?</span>
              <span class="followup-arrow" aria-hidden="true">→</span>
            </button>
            <button
              class="followup"
              type="button"
              data-prompt="Why is Tim a strong fit for Revolut?"
              data-response="For Revolut, I would look at systems thinking: evidence, constraints, metrics, and calm high-density fintech UI."
            >
              <span class="followup-text">Why Revolut?</span>
              <span class="followup-arrow" aria-hidden="true">→</span>
            </button>
            <button
              class="followup"
              type="button"
              data-prompt="Summarize Tim's strongest sides in 30 seconds."
              data-response="Tim is strongest where product strategy, research loops, interface craft, and execution discipline meet."
            >
              <span class="followup-text">Strengths in 30 sec</span>
              <span class="followup-arrow" aria-hidden="true">→</span>
            </button>
            <button
              class="followup"
              type="button"
              data-prompt="Where did Tim work before and what did he own?"
              data-response="I can map his previous roles into product domains, responsibilities, and the kind of decisions he owned."
            >
              <span class="followup-text">Experience</span>
              <span class="followup-arrow" aria-hidden="true">→</span>
            </button>
            <button
              class="followup"
              type="button"
              data-prompt="Show me measurable product impact."
              data-response="Let's pull out the numbers first: user scale, conversion movement, research speed, and shipped business impact."
            >
              <span class="followup-text">Impact</span>
              <span class="followup-arrow" aria-hidden="true">→</span>
            </button>
            <button
              class="followup"
              type="button"
              data-prompt="How does Tim make design decisions?"
              data-response="His process should read as signal over noise: define the problem, find evidence, model tradeoffs, ship clearly."
            >
              <span class="followup-text">Process</span>
              <span class="followup-arrow" aria-hidden="true">→</span>
            </button>
          </div>
        </div>
      </section>
    </main>
    <script>
      const assistantMessage = document.querySelector("#assistant-message");
      const assistantConsole = document.querySelector(".assistant-console");
      const userMessage = document.querySelector("#user-message");
      const userMessageRow = document.querySelector("#user-message-row");
      const promptInput = document.querySelector("#portfolio-prompt");
      const promptButtons = document.querySelectorAll(".followup");
      const followups = document.querySelector(".followups");
      const composer = document.querySelector(".composer");
      const sendButton = document.querySelector(".send-button");
      const mascot = document.querySelector(".chat-mascot");
      const mascotVideo = document.querySelector("#mascot-video");
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const mascotClips = {
        sleep: {
          src: "assets/mascot-sleep-loop.mp4?v=video-clips-4",
          loop: true,
        },
        awake: {
          src: "assets/mascot-awake-loop.mp4?v=video-clips-4",
          loop: true,
        },
        wake: {
          src: "assets/mascot-wake.mp4?v=video-clips-4",
          loop: false,
        },
        lookInput: {
          src: "assets/mascot-look-input.mp4?v=video-clips-4",
          loop: false,
        },
        input: {
          src: "assets/mascot-input-loop.mp4?v=video-clips-4",
          loop: true,
        },
        fallAsleep: {
          src: "assets/mascot-fall-asleep.mp4?v=video-clips-4",
          loop: false,
        },
        startle: {
          src: "assets/mascot-startle.mp4?v=video-clips-4",
          loop: false,
        },
        send: {
          src: "assets/mascot-send.mp4?v=video-clips-4",
          loop: false,
        },
      };
      let mascotMode = "sleep";
      let mascotReturnMode = "sleep";
      let mascotActionActive = false;
      let mascotIdleTimer;

      const updateFollowupFade = () => {
        const maxScroll = followups.scrollWidth - followups.clientWidth;
        const scrollLeft = Math.round(followups.scrollLeft);

        followups.classList.toggle("has-overflow", maxScroll > 1);
        followups.classList.toggle("is-at-start", maxScroll <= 1 || scrollLeft <= 1);
        followups.classList.toggle("is-at-end", maxScroll <= 1 || scrollLeft >= maxScroll - 1);
      };

      const setMascotClip = (clipName, options = {}) => {
        const clip = mascotClips[clipName];

        if (!clip) {
          return;
        }

        window.clearTimeout(mascotIdleTimer);

        if (mascotVideo.dataset.clip !== clipName) {
          mascotVideo.dataset.clip = clipName;
          mascotVideo.src = clip.src;
          mascotVideo.load();
        }

        mascotMode = clipName;
        mascot.dataset.state = clipName;
        mascotVideo.loop = clip.loop;

        if (options.restart !== false) {
          try {
            mascotVideo.currentTime = 0;
          } catch {
            // Some mobile browsers only allow seeking after metadata is ready.
          }
        }

        mascotVideo.play().catch(() => {});

        if (clip.loop && clipName === "awake") {
          scheduleMascotSleep();
        }
      };

      const playMascotAction = (clipName, nextClip = "awake") => {
        if (mascotActionActive && mascotMode === clipName) {
          return;
        }

        mascotActionActive = true;
        mascotReturnMode = nextClip;
        setMascotClip(clipName);
      };

      const scheduleMascotSleep = () => {
        window.clearTimeout(mascotIdleTimer);

        if (reduceMotion || document.activeElement === promptInput) {
          return;
        }

        mascotIdleTimer = window.setTimeout(() => {
          if (!mascotActionActive && document.activeElement !== promptInput) {
            playMascotAction("fallAsleep", "sleep");
          }
        }, 8500);
      };

      const restoreMascotMode = () => {
        const nextClip =
          mascotReturnMode === "input" && document.activeElement !== promptInput
            ? "awake"
            : mascotReturnMode;

        mascotActionActive = false;

        if (nextClip === "lookInput") {
          playMascotAction("lookInput", "input");
          return;
        }

        setMascotClip(nextClip, { restart: nextClip === "input" });
      };

      mascotVideo.addEventListener("ended", () => {
        if (!mascotActionActive) {
          return;
        }

        restoreMascotMode();
      });

      Object.values(mascotClips).forEach((clip) => {
        const video = document.createElement("video");
        video.src = clip.src;
        video.muted = true;
        video.playsInline = true;
        video.preload = "auto";
      });

      const watchInput = () => {
        mascotReturnMode = "input";

        if (mascotActionActive) {
          return;
        }

        window.clearTimeout(mascotIdleTimer);

        if (mascotMode === "input") {
          return;
        }

        if (mascotMode === "sleep") {
          playMascotAction("wake", "lookInput");
          return;
        }

        playMascotAction("lookInput", "input");
      };

      const leaveInput = () => {
        mascotReturnMode = "awake";

        if (mascotActionActive) {
          return;
        }

        setMascotClip("awake", { restart: false });
      };

      const showExchange = (prompt, response) => {
        assistantConsole.classList.add("has-user");
        userMessage.textContent = prompt;
        userMessageRow.hidden = false;
        assistantMessage.textContent = response;
        promptInput.value = "";
        window.requestAnimationFrame(updateFollowupFade);
      };

      promptButtons.forEach((button) => {
        button.addEventListener("click", () => {
          promptButtons.forEach((item) => item.classList.remove("is-active"));
          button.classList.add("is-active");
          promptInput.value = button.dataset.prompt;
          showExchange(button.dataset.prompt, button.dataset.response);
          button.classList.add("is-used");
          window.requestAnimationFrame(updateFollowupFade);
          playMascotAction("send", "input");
          promptInput.focus({ preventScroll: true });
        });
      });

      composer.addEventListener("submit", (event) => {
        event.preventDefault();
        const prompt = promptInput.value.trim();

        if (!prompt) {
          promptInput.focus({ preventScroll: true });
          return;
        }

        playMascotAction("send", "input");
        promptButtons.forEach((item) => item.classList.remove("is-active"));
        showExchange(prompt, `I'll route this as a portfolio brief: ${prompt}`);
      });

      mascot.addEventListener("click", () => {
        if (mascotMode === "sleep" || mascotMode === "fallAsleep") {
          playMascotAction("wake", "awake");
          return;
        }

        if (mascotActionActive) {
          return;
        }

        if (mascotMode === "awake" || mascotMode === "input") {
          playMascotAction("startle", document.activeElement === promptInput ? "input" : "awake");
        }
      });
      promptInput.addEventListener("focus", watchInput);
      promptInput.addEventListener("input", watchInput);
      promptInput.addEventListener("blur", () => {
        window.setTimeout(() => {
          if (document.activeElement !== promptInput) {
            leaveInput();
          }
        }, 90);
      });
      sendButton.addEventListener("pointerdown", () => playMascotAction("send", "input"));
      sendButton.addEventListener("focus", () => playMascotAction("send", "input"));
      followups.addEventListener("scroll", updateFollowupFade, { passive: true });
      window.addEventListener("resize", updateFollowupFade);
      window.addEventListener("load", updateFollowupFade);
      updateFollowupFade();
      setMascotClip("sleep", { restart: false });
    </script>
  </body>
</html>
