<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tamirlan Askar - Loading Prototype</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23111111'/%3E%3Crect x='4' y='6' width='3' height='2' fill='%23F2F2EE'/%3E%3Crect x='9' y='6' width='3' height='2' fill='%23F2F2EE'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        --bg-page: #000000;
        --bg-panel: #090909;
        --text-primary: #f2f2ee;
        --text-secondary: #a6a6a0;
        --text-muted: #70706a;
        --border-subtle: #252521;
        --border-default: #34342e;
        --signal-active: #9fffd7;
        --signal-dim: #4fd6b0;
        --glass-fill: rgba(255, 255, 255, 0.075);
        --glass-fill-strong: rgba(255, 255, 255, 0.11);
        --glass-border: rgba(255, 255, 255, 0.15);
        --glass-shine: rgba(255, 255, 255, 0.22);
        --pixel: rgba(242, 242, 238, 0.82);
        --pixel-dim: rgba(242, 242, 238, 0.18);
        --scan: rgba(242, 242, 238, 0.055);
        --shadow: rgba(0, 0, 0, 0.56);
        --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-in: cubic-bezier(0.7, 0, 0.84, 0);
        --ease-mascot: cubic-bezier(0.45, 0, 0.2, 1);
        font-family: Inter, Manrope, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text-primary);
        background: var(--bg-page);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: var(--bg-page);
      }

      body {
        overflow-x: hidden;
      }

      button,
      a {
        font: inherit;
      }

      .site-shell {
        min-height: 100vh;
        position: relative;
        isolation: isolate;
        overflow-x: hidden;
        background: var(--bg-page);
      }

      .loader {
        position: relative;
        z-index: 20;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg-page);
        overflow: hidden;
      }

      .loader::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        z-index: 1;
        height: 46%;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.94));
        pointer-events: none;
      }

      .loader-video {
        position: absolute;
        inset: 0;
        z-index: 2;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
        pointer-events: none;
        animation: loader-video-exit 260ms linear 5s forwards;
      }

      .mascot-hold {
        position: absolute;
        left: 50%;
        top: calc(50% - 222px);
        z-index: 3;
        display: grid;
        place-items: center;
        width: min(238px, 27vw);
        aspect-ratio: 512 / 320;
        border: 0;
        padding: 0;
        background: transparent;
        opacity: 0;
        transform: translate3d(-50%, 10px, 0) scale(0.94);
        cursor: pointer;
        animation: mascot-hold-enter 520ms var(--ease-out) 5s forwards;
        transition: top 520ms var(--ease-out), width 420ms var(--ease-out);
      }

      .mascot-hold:focus-visible {
        outline: 0;
      }

      .loader.is-chatting .mascot-hold {
        top: clamp(76px, calc(24vh - 94px), 250px);
      }

      .mascot-video {
        position: absolute;
        left: 50%;
        top: 50%;
        display: block;
        width: 200%;
        height: 200%;
        object-fit: contain;
        background: #000;
        mix-blend-mode: screen;
        -webkit-mask-image: radial-gradient(
          ellipse 44% 38% at 50% 50%,
          #000 0,
          #000 48%,
          rgba(0, 0, 0, 0.58) 63%,
          transparent 80%
        );
        mask-image: radial-gradient(
          ellipse 44% 38% at 50% 50%,
          #000 0,
          #000 48%,
          rgba(0, 0, 0, 0.58) 63%,
          transparent 80%
        );
        pointer-events: none;
        filter: drop-shadow(0 0 28px rgba(242, 242, 238, 0.08));
        transform: translate(-50%, -50%);
      }

      .chat-mascot {
        --track-yaw: 0deg;
        --track-pitch: 0deg;
        --track-x: 0px;
        --track-y: 0px;
        --track-eye-x: 0px;
        --track-eye-y: 0px;
        --track-skew: 0deg;
        --track-brow-left-y: 0px;
        --track-brow-right-y: 0px;
        --track-brow-left-rot: 4deg;
        --track-brow-right-rot: -4deg;
        --track-eye-scale-y: 1;
        --track-eye-scale-x: 0.96;
        --squint-face-pitch: 10deg;
        --squint-y: 5px;
        --squint-eye-y: 6px;
        --squint-brow-left-y: 5px;
        --squint-brow-right-y: 5px;
        --squint-brow-left-rot: -2deg;
        --squint-brow-right-rot: 2deg;
      }

      .chat-face {
        position: relative;
        width: 100%;
        height: 100%;
        transform-origin: 50% 58%;
        transition: transform 520ms var(--ease-out);
        will-change: transform;
      }

      .chat-eye,
      .chat-brow {
        position: absolute;
        display: grid;
        align-content: center;
        justify-content: center;
        transform-origin: 50% 50%;
        transition:
          opacity 320ms var(--ease-out),
          transform 520ms var(--ease-out),
          filter 420ms var(--ease-out);
        will-change: transform, opacity;
      }

      .chat-eye {
        top: 47%;
        width: 36px;
        height: 74px;
        grid-template-columns: repeat(5, 4px);
        grid-auto-rows: 4px;
        gap: 2px;
        border-radius: 5px;
        translate: 0 -50%;
        filter:
          drop-shadow(0 0 8px rgba(242, 242, 238, 0.44))
          drop-shadow(0 0 22px rgba(242, 242, 238, 0.2));
      }

      .chat-eye-left {
        left: 21.1%;
      }

      .chat-eye-right {
        right: 21.1%;
      }

      .chat-brow {
        top: -27%;
        width: 57px;
        height: 19px;
        grid-template-columns: repeat(8, 4px);
        grid-auto-rows: 4px;
        gap: 2px;
        opacity: 0.86;
        filter:
          drop-shadow(0 0 8px rgba(242, 242, 238, 0.3))
          drop-shadow(0 0 18px rgba(242, 242, 238, 0.12));
      }

      .chat-brow-left {
        left: 8.5%;
        transform: translate3d(0, 0, 0) rotateZ(4deg);
      }

      .chat-brow-right {
        right: 8.5%;
        transform: translate3d(0, 0, 0) rotateZ(-4deg);
      }

      .chat-led {
        display: grid;
        place-items: center;
        width: 4px;
        height: 4px;
        border-radius: 1px;
        background: rgba(242, 242, 238, calc(var(--o, 0.82) * 0.16));
        color: rgba(242, 242, 238, 0.9);
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: 5.4px;
        font-weight: 800;
        line-height: 1;
        text-shadow:
          0 0 5px rgba(242, 242, 238, 0.62),
          0 0 14px rgba(242, 242, 238, 0.24);
        box-shadow:
          0 0 4px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.72)),
          0 0 13px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.34)),
          0 0 28px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.14));
        transition:
          opacity 70ms linear,
          color 70ms linear,
          background-color 70ms linear,
          text-shadow 70ms linear,
          box-shadow 70ms linear;
      }

      .chat-brow .chat-led {
        opacity: 0.82;
      }

      .chat-mascot[data-state="idle-left"] .chat-face {
        transform: perspective(520px) rotateY(-8deg) translateX(-4px);
      }

      .chat-mascot[data-state="idle-right"] .chat-face {
        transform: perspective(520px) rotateY(8deg) translateX(4px);
      }

      .chat-mascot[data-state="idle-left"] .chat-eye {
        transform: translateX(-6px) skewY(-1.8deg) scaleX(0.94);
      }

      .chat-mascot[data-state="idle-right"] .chat-eye {
        transform: translateX(6px) skewY(1.8deg) scaleX(0.94);
      }

      .chat-mascot[data-state="sleepy"] .chat-face {
        transform: translateY(8px) scaleY(0.98);
      }

      .chat-mascot[data-state="sleepy"] .chat-eye {
        opacity: 0.74;
        transform: scaleY(0.08);
        filter:
          drop-shadow(0 0 5px rgba(242, 242, 238, 0.34))
          drop-shadow(0 0 15px rgba(242, 242, 238, 0.12));
      }

      .chat-mascot[data-state="track"] .chat-face {
        transform:
          perspective(520px)
          rotateY(var(--track-yaw))
          rotateX(var(--track-pitch))
          translate3d(var(--track-x), var(--track-y), 0);
        transition-duration: 170ms;
      }

      .chat-mascot[data-state="track"] .chat-eye {
        transform:
          translate3d(var(--track-eye-x), var(--track-eye-y), 0)
          skewY(var(--track-skew))
          scaleX(var(--track-eye-scale-x))
          scaleY(var(--track-eye-scale-y));
        transition-duration: 170ms;
      }

      .chat-mascot[data-state="track"] .chat-brow-left {
        transform:
          translate3d(0, var(--track-brow-left-y), 0)
          rotateZ(var(--track-brow-left-rot));
        transition-duration: 170ms;
      }

      .chat-mascot[data-state="track"] .chat-brow-right {
        transform:
          translate3d(0, var(--track-brow-right-y), 0)
          rotateZ(var(--track-brow-right-rot));
        transition-duration: 170ms;
      }

      .chat-mascot[data-state="look-input"] .chat-face {
        transform: perspective(520px) rotateX(8deg) translateY(6px);
      }

      .chat-mascot[data-state="look-input"] .chat-eye {
        transform: translateY(8px) scaleY(0.96);
      }

      .chat-mascot[data-state="squint"] .chat-face {
        transform:
          perspective(520px)
          rotateY(var(--track-yaw))
          rotateX(var(--squint-face-pitch))
          translate3d(var(--track-x), var(--squint-y), 0);
        transition-duration: 180ms;
      }

      .chat-mascot[data-state="squint"] .chat-eye {
        transform:
          translate3d(var(--track-eye-x), var(--squint-eye-y), 0)
          skewY(var(--track-skew))
          scaleX(1.04)
          scaleY(0.34);
        filter:
          drop-shadow(0 0 7px rgba(242, 242, 238, 0.42))
          drop-shadow(0 0 20px rgba(242, 242, 238, 0.16));
        transition-duration: 180ms;
      }

      .chat-mascot[data-state="squint"] .chat-brow-left {
        transform:
          translate3d(-3px, var(--squint-brow-left-y), 0)
          rotateZ(var(--squint-brow-left-rot));
        transition-duration: 180ms;
      }

      .chat-mascot[data-state="squint"] .chat-brow-right {
        transform:
          translate3d(3px, var(--squint-brow-right-y), 0)
          rotateZ(var(--squint-brow-right-rot));
        transition-duration: 180ms;
      }

      .chat-mascot[data-state="look-send"] .chat-face {
        transform: perspective(520px) rotateY(12deg) translate3d(8px, 4px, 0);
      }

      .chat-mascot[data-state="look-send"] .chat-eye {
        transform: translate3d(9px, 6px, 0) skewY(2deg) scaleX(0.92);
      }

      .chat-mascot[data-state="look-send"] .chat-brow-right {
        transform: translate3d(6px, -9px, 0) rotateZ(-10deg);
      }

      .chat-mascot[data-state="startled"] .chat-face {
        animation: mascot-startle 720ms var(--ease-out);
      }

      .chat-mascot[data-state="startled"] .chat-eye {
        transform: scaleX(1.08) scaleY(1.14);
        filter:
          drop-shadow(0 0 10px rgba(242, 242, 238, 0.6))
          drop-shadow(0 0 30px rgba(242, 242, 238, 0.24));
      }

      .chat-mascot[data-state="startled"] .chat-brow-left {
        transform: translate3d(-8px, -13px, 0) rotateZ(-10deg);
      }

      .chat-mascot[data-state="startled"] .chat-brow-right {
        transform: translate3d(8px, -13px, 0) rotateZ(10deg);
      }

      .chat-mascot.is-blinking .chat-eye {
        animation: mascot-blink 260ms var(--ease-in);
      }

      .sleep-z {
        position: absolute;
        z-index: 4;
        top: -21%;
        right: 14%;
        color: rgba(242, 242, 238, 0.9);
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: 11px;
        font-weight: 950;
        line-height: 1;
        opacity: 0;
        -webkit-text-stroke: 0.35px rgba(242, 242, 238, 0.58);
        text-shadow:
          0 0 1px rgba(242, 242, 238, 0.8),
          0 0 8px rgba(242, 242, 238, 0.72),
          0 0 20px rgba(242, 242, 238, 0.3);
        transform: translate3d(0, 8px, 0) scale(0.82);
        pointer-events: none;
      }

      .sleep-z-two {
        top: -32%;
        right: 6%;
        font-size: 14px;
      }

      .sleep-z-three {
        top: -43%;
        right: -4%;
        font-size: 17px;
      }

      .chat-mascot[data-state="sleepy"] .sleep-z {
        animation: sleep-z 1.8s var(--ease-out) infinite;
      }

      .chat-mascot[data-state="sleepy"] .sleep-z-two {
        animation-delay: 180ms;
      }

      .chat-mascot[data-state="sleepy"] .sleep-z-three {
        animation-delay: 360ms;
      }

      .assistant-console {
        --console-y-start: calc(-50% + 18px);
        --console-y-end: -50%;
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 4;
        display: flex;
        flex-direction: column;
        width: min(560px, calc(100vw - 48px));
        opacity: 0;
        transform: translate3d(-50%, var(--console-y-start), 0);
        animation: console-enter 760ms var(--ease-out) 5.05s forwards;
        transition:
          top 620ms var(--ease-out),
          transform 620ms var(--ease-out),
          width 360ms var(--ease-out);
      }

      .assistant-console.has-user {
        top: 0;
        bottom: 0;
        width: min(760px, calc(100vw - 48px));
        transform: translate3d(-50%, 0, 0);
        animation: none;
        opacity: 1;
        pointer-events: none;
      }

      .assistant-console.has-user::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 0;
        z-index: 2;
        width: min(620px, calc(100vw - 24px));
        height: 214px;
        transform: translateX(-50%);
        background: linear-gradient(
          180deg,
          transparent 0%,
          rgba(0, 0, 0, 0.42) 38%,
          rgba(0, 0, 0, 0.88) 78%,
          #000 100%
        );
        pointer-events: none;
      }

      .thread {
        display: grid;
        gap: 10px;
        order: 1;
        width: min(560px, 100%);
        margin: 0 auto 10px;
      }

      .assistant-console.has-user .thread {
        position: absolute;
        top: clamp(206px, calc(50% - 224px), 410px);
        left: 0;
        right: 0;
        bottom: calc(clamp(28px, 5vh, 54px) + 138px);
        z-index: 1;
        box-sizing: border-box;
        width: min(576px, 100%);
        max-width: min(576px, 100%);
        margin: 0 auto;
        padding: 0 8px 30px;
        overflow-x: visible;
        overflow-y: auto;
        overscroll-behavior: contain;
        pointer-events: auto;
        scrollbar-width: none;
        -webkit-mask-image: linear-gradient(
          180deg,
          #000 0,
          #000 calc(100% - 72px),
          transparent 100%
        );
        mask-image: linear-gradient(
          180deg,
          #000 0,
          #000 calc(100% - 72px),
          transparent 100%
        );
      }

      .assistant-console.has-user .thread.is-scrolled {
        -webkit-mask-image: linear-gradient(
          180deg,
          transparent 0,
          #000 22px,
          #000 calc(100% - 72px),
          transparent 100%
        );
        mask-image: linear-gradient(
          180deg,
          transparent 0,
          #000 22px,
          #000 calc(100% - 72px),
          transparent 100%
        );
      }

      .assistant-console.has-user .thread::-webkit-scrollbar {
        display: none;
      }

      .assistant-console.has-user .message-row {
        width: 100%;
        min-width: 0;
      }

      .assistant-console.has-user .message-row.user {
        justify-content: flex-end;
      }

      .message-row {
        display: flex;
        align-items: center;
      }

      .message-row[hidden] {
        display: none !important;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .message-row.agent {
        justify-content: center;
        text-align: center;
      }

      .message-bubble {
        position: relative;
        overflow: hidden;
        max-width: min(620px, 88%);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        padding: 16px 18px 17px;
        background: var(--glass-fill);
        -webkit-backdrop-filter: blur(30px) saturate(1.35);
        backdrop-filter: blur(30px) saturate(1.35);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.11),
          inset 0 -1px 0 rgba(255, 255, 255, 0.035),
          0 18px 58px rgba(0, 0, 0, 0.28);
      }

      .message-bubble::before,
      .composer::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 38%),
          radial-gradient(circle at 88% 12%, rgba(255, 255, 255, 0.13), transparent 28%);
        opacity: 0.72;
      }

      .message-bubble > * {
        position: relative;
      }

      .agent-bubble {
        max-width: min(760px, 100%);
        border: 0;
        border-radius: 0;
        padding: 0 12px;
        background: transparent;
        -webkit-backdrop-filter: none;
        backdrop-filter: none;
        box-shadow: none;
      }

      .agent-bubble::before {
        content: none;
      }

      .assistant-console.has-user .message-row.agent {
        justify-content: flex-start;
        text-align: left;
      }

      .assistant-console.has-user .agent-bubble {
        width: 100%;
        min-width: 0;
        max-width: 100%;
        border: 0;
        border-radius: 0;
        padding: 0 4px;
        background: transparent;
        -webkit-backdrop-filter: none;
        backdrop-filter: none;
        box-shadow: none;
      }

      .assistant-console.has-user .agent-bubble::before {
        content: none;
      }

      .user-bubble {
        border-color: rgba(221, 255, 244, 0.24);
        border-bottom-right-radius: 12px;
        background: rgba(225, 255, 246, 0.13);
        color: var(--text-primary);
      }

      .assistant-console.has-user .user-bubble {
        max-width: min(420px, 82%);
        border-radius: 22px;
        border-bottom-right-radius: 10px;
        padding: 7px 12px 8px;
      }

      .agent-name,
      .followup,
      .send-button {
        font-weight: 650;
      }

      .agent-name {
        display: none;
        margin-bottom: 9px;
        color: rgba(242, 242, 238, 0.56);
        font-size: 13px;
        letter-spacing: 0;
        line-height: 1.3;
      }

      .agent-name::before {
        content: none;
      }

      .assistant-console.has-user .agent-name {
        display: none;
      }

      .agent-message {
        margin: 0;
        color: var(--text-primary);
        font-size: clamp(28px, 3.6vw, 42px);
        font-weight: 620;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .assistant-console.has-user .agent-message {
        font-size: 14px;
        font-weight: 500;
        line-height: 1.45;
      }

      .case-preview-rail {
        display: flex;
        gap: 10px;
        width: 100%;
        max-width: 100%;
        min-width: 0;
        margin-top: 14px;
        padding: 1px 8px 8px 0;
        overflow-x: auto;
        overscroll-behavior-inline: contain;
        scroll-padding-inline: 0 8px;
        scrollbar-width: none;
        -webkit-mask-image: linear-gradient(
          90deg,
          #000 0,
          #000 calc(100% - 6px),
          transparent 100%
        );
        mask-image: linear-gradient(
          90deg,
          #000 0,
          #000 calc(100% - 6px),
          transparent 100%
        );
      }

      .case-preview-rail[hidden] {
        display: none;
      }

      .case-preview-rail::-webkit-scrollbar {
        display: none;
      }

      .case-card {
        --case-accent: var(--signal-active);
        --case-soft: rgba(159, 255, 215, 0.14);
        --case-border: rgba(159, 255, 215, 0.44);
        --case-glow: rgba(159, 255, 215, 0.22);
        position: relative;
        flex: 0 0 208px;
        overflow: hidden;
        display: grid;
        grid-template-rows: 104px minmax(128px, auto);
        min-height: 236px;
        border: 1px solid rgba(242, 242, 238, 0.13);
        border-radius: 6px;
        padding: 0;
        background: rgba(12, 12, 12, 0.94);
        color: var(--text-primary);
        text-align: left;
        cursor: pointer;
        box-shadow: inset 0 1px 0 rgba(242, 242, 238, 0.05);
        animation: case-card-enter 360ms var(--ease-out) both;
        animation-delay: calc(var(--card-index, 0) * 42ms);
        transition:
          border-color 160ms var(--ease-out),
          background 160ms var(--ease-out),
          transform 160ms var(--ease-out),
          box-shadow 160ms var(--ease-out);
      }

      .case-card:hover,
      .case-card:focus-visible,
      .case-card.is-active {
        border-color: rgba(159, 255, 215, 0.42);
        background: rgba(18, 22, 20, 0.96);
        outline: none;
        transform: translateY(-2px);
        box-shadow:
          inset 0 1px 0 rgba(242, 242, 238, 0.07),
          0 0 0 1px rgba(159, 255, 215, 0.04),
          0 18px 36px rgba(0, 0, 0, 0.28);
      }

      .case-card:focus-visible {
        box-shadow:
          0 0 0 2px rgba(159, 255, 215, 0.32),
          0 18px 36px rgba(0, 0, 0, 0.28);
      }

      .case-preview-art {
        position: relative;
        overflow: hidden;
        min-height: 104px;
        border-bottom: 1px solid rgba(242, 242, 238, 0.1);
        background:
          linear-gradient(135deg, rgba(242, 242, 238, 0.16), transparent 28%),
          repeating-linear-gradient(
            90deg,
            rgba(242, 242, 238, 0.08) 0 1px,
            transparent 1px 12px
          ),
          repeating-linear-gradient(
            0deg,
            rgba(242, 242, 238, 0.055) 0 1px,
            transparent 1px 12px
          ),
          #101010;
      }

      .case-preview-art::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 18% 28%, var(--case-accent) 0 2px, transparent 2.5px),
          radial-gradient(circle at 33% 54%, rgba(242, 242, 238, 0.74) 0 2px, transparent 2.5px),
          radial-gradient(circle at 52% 38%, rgba(242, 242, 238, 0.34) 0 2px, transparent 2.5px),
          radial-gradient(circle at 70% 66%, rgba(242, 242, 238, 0.54) 0 2px, transparent 2.5px),
          radial-gradient(circle at 86% 30%, rgba(242, 242, 238, 0.26) 0 2px, transparent 2.5px);
        opacity: 0.86;
      }

      .case-preview-art::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.42)),
          repeating-linear-gradient(
            0deg,
            transparent 0 5px,
            rgba(0, 0, 0, 0.24) 5px 6px
          );
        pointer-events: none;
      }

      .case-card:hover .case-preview-art::before,
      .case-card:focus-visible .case-preview-art::before,
      .case-card.is-active .case-preview-art::before {
        opacity: 1;
      }

      .case-card[data-variant="systems"] {
        --case-accent: #9fffd7;
        --case-soft: rgba(159, 255, 215, 0.14);
        --case-border: rgba(159, 255, 215, 0.44);
        --case-glow: rgba(159, 255, 215, 0.22);
      }

      .case-card[data-variant="growth"] {
        --case-accent: #e6d06c;
        --case-soft: rgba(230, 208, 108, 0.13);
        --case-border: rgba(230, 208, 108, 0.38);
        --case-glow: rgba(230, 208, 108, 0.18);
      }

      .case-card[data-variant="fintech"] {
        --case-accent: #d8d8d0;
        --case-soft: rgba(216, 216, 208, 0.13);
        --case-border: rgba(216, 216, 208, 0.34);
        --case-glow: rgba(216, 216, 208, 0.16);
      }

      .case-card[data-variant="ai"] {
        --case-accent: #4fd6b0;
        --case-soft: rgba(79, 214, 176, 0.14);
        --case-border: rgba(79, 214, 176, 0.42);
        --case-glow: rgba(79, 214, 176, 0.2);
      }

      .case-art-grid,
      .case-art-bars,
      .case-art-path {
        position: absolute;
        z-index: 1;
      }

      .case-art-grid {
        inset: 18px 18px auto;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
      }

      .case-art-cell {
        height: 18px;
        border: 1px solid rgba(242, 242, 238, 0.14);
        background: rgba(242, 242, 238, 0.035);
      }

      .case-art-cell:nth-child(2),
      .case-art-cell:nth-child(7) {
        border-color: var(--case-border);
        background: var(--case-soft);
        box-shadow: 0 0 16px var(--case-glow);
      }

      .case-art-bars {
        left: 18px;
        right: 18px;
        bottom: 17px;
        display: flex;
        align-items: end;
        gap: 5px;
        height: 42px;
      }

      .case-art-bar {
        flex: 1;
        min-width: 0;
        height: var(--bar-height, 50%);
        background: rgba(242, 242, 238, 0.12);
      }

      .case-art-bar:nth-child(3),
      .case-art-bar:nth-child(6) {
        background: var(--case-accent);
        box-shadow: 0 0 14px var(--case-glow);
      }

      .case-art-path {
        left: 18px;
        right: 18px;
        top: 30px;
        height: 34px;
        border-top: 1px solid rgba(242, 242, 238, 0.18);
        border-right: 1px solid rgba(242, 242, 238, 0.14);
        transform: skewX(-22deg);
      }

      .case-art-path::before,
      .case-art-path::after {
        content: "";
        position: absolute;
        width: 7px;
        height: 7px;
        background: var(--case-accent);
        box-shadow: 0 0 16px var(--case-glow);
      }

      .case-art-path::before {
        left: 12px;
        top: -4px;
      }

      .case-art-path::after {
        right: 18px;
        bottom: -4px;
      }

      .case-card-body {
        display: grid;
        align-content: start;
        min-width: 0;
        padding: 13px 14px 14px;
      }

      .case-card-source {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-width: 0;
        color: rgba(242, 242, 238, 0.78);
        font-size: 12px;
        font-weight: 650;
        line-height: 1.2;
      }

      .case-card-source::before {
        content: "";
        flex: 0 0 auto;
        width: 8px;
        height: 8px;
        border: 1px solid var(--case-border);
        background: var(--case-soft);
        box-shadow: 0 0 14px var(--case-glow);
      }

      .case-card-title {
        display: -webkit-box;
        min-height: 4.05em;
        margin: 9px 0 0;
        overflow: hidden;
        color: var(--text-primary);
        font-size: 16px;
        font-weight: 650;
        letter-spacing: 0;
        line-height: 1.35;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
      }

      .case-card-meta {
        margin-top: 16px;
        color: var(--text-muted);
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.04em;
        line-height: 1.25;
        text-transform: uppercase;
      }

      .user-message {
        margin: 0;
        font-size: 14px;
        line-height: 1.45;
      }

      .assistant-console.has-user .user-message {
        line-height: 1.3;
      }

      .followup-rail {
        position: relative;
        order: 2;
        width: min(560px, 100%);
        margin: 9px auto 0;
      }

      .assistant-console.has-user .followup-rail {
        position: absolute;
        left: 0;
        right: 0;
        bottom: calc(clamp(28px, 5vh, 54px) + 62px);
        z-index: 3;
        order: 2;
        margin: 0 auto;
        pointer-events: auto;
      }

      .followups {
        display: flex;
        flex-wrap: nowrap;
        gap: 7px;
        width: 100%;
        margin: 0;
        padding: 0 0 7px;
        overflow-x: auto;
        overscroll-behavior-inline: contain;
        scroll-behavior: smooth;
        scrollbar-width: none;
      }

      .assistant-console.has-user .followups {
        margin: 0;
      }

      .followups.has-overflow.is-at-start {
        -webkit-mask-image: linear-gradient(
          90deg,
          #000 0,
          #000 calc(100% - 26px),
          transparent 100%
        );
        mask-image: linear-gradient(
          90deg,
          #000 0,
          #000 calc(100% - 26px),
          transparent 100%
        );
      }

      .followups.has-overflow.is-at-end {
        -webkit-mask-image: linear-gradient(
          90deg,
          transparent 0,
          #000 18px,
          #000 100%
        );
        mask-image: linear-gradient(
          90deg,
          transparent 0,
          #000 18px,
          #000 100%
        );
      }

      .followups.has-overflow:not(.is-at-start):not(.is-at-end) {
        -webkit-mask-image: linear-gradient(
          90deg,
          transparent 0,
          #000 18px,
          #000 calc(100% - 26px),
          transparent 100%
        );
        mask-image: linear-gradient(
          90deg,
          transparent 0,
          #000 18px,
          #000 calc(100% - 26px),
          transparent 100%
        );
      }

      .followups::-webkit-scrollbar {
        display: none;
      }

      .followup-scroll {
        position: absolute;
        top: calc(50% - 3px);
        z-index: 2;
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 50%;
        background: rgba(20, 20, 20, 0.72);
        color: rgba(242, 242, 238, 0.8);
        -webkit-backdrop-filter: blur(22px) saturate(1.22);
        backdrop-filter: blur(22px) saturate(1.22);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.1),
          0 12px 28px rgba(0, 0, 0, 0.28);
        opacity: 0;
        pointer-events: none;
        transform: translateY(-50%) scale(0.94);
        transition:
          opacity 150ms var(--ease-out),
          background 150ms var(--ease-out),
          transform 150ms var(--ease-out);
      }

      .followup-scroll[hidden] {
        display: none;
      }

      .followup-scroll.prev {
        left: -12px;
      }

      .followup-scroll.next {
        right: -12px;
      }

      .followup-scroll svg {
        width: 15px;
        height: 15px;
      }

      .followup-rail:hover .followup-scroll:not([hidden]),
      .followup-rail:focus-within .followup-scroll:not([hidden]) {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(-50%) scale(1);
      }

      .followup-scroll:hover,
      .followup-scroll:focus-visible {
        background: rgba(255, 255, 255, 0.12);
        color: var(--text-primary);
        outline: none;
      }

      .followup {
        display: grid;
        flex: 0 0 auto;
        grid-template-columns: minmax(0, 1fr) 20px;
        column-gap: 8px;
        align-items: center;
        min-height: 36px;
        min-width: 0;
        max-width: 280px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        padding: 7px 9px 7px 13px;
        background: rgba(255, 255, 255, 0.055);
        -webkit-backdrop-filter: blur(22px) saturate(1.22);
        backdrop-filter: blur(22px) saturate(1.22);
        color: rgba(242, 242, 238, 0.76);
        font-size: 14px;
        letter-spacing: 0;
        line-height: 1.2;
        text-align: left;
        cursor: pointer;
        transition:
          border-color 160ms var(--ease-out),
          background 160ms var(--ease-out),
          color 160ms var(--ease-out),
          box-shadow 160ms var(--ease-out);
      }

      .followup.is-used {
        display: none;
      }

      .followup:hover,
      .followup:focus-visible,
      .followup.is-active {
        border-color: rgba(230, 255, 248, 0.32);
        background: rgba(230, 255, 248, 0.12);
        color: var(--text-primary);
        outline: none;
        box-shadow: 0 0 28px rgba(230, 255, 248, 0.1);
      }

      .followup-text {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .followup-arrow {
        display: grid;
        place-items: center;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        color: rgba(242, 242, 238, 0.68);
        background: rgba(255, 255, 255, 0.06);
        transition:
          background 160ms var(--ease-out),
          color 160ms var(--ease-out),
          transform 160ms var(--ease-out);
      }

      .followup:hover .followup-arrow,
      .followup:focus-visible .followup-arrow,
      .followup.is-active .followup-arrow {
        color: var(--text-primary);
        background: rgba(255, 255, 255, 0.12);
        transform: translateX(2px);
      }

      .composer {
        position: relative;
        overflow: hidden;
        display: grid;
        order: 3;
        width: min(560px, 100%);
        margin: 0 auto;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: end;
        gap: 8px;
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        padding: 6px 6px 6px 17px;
        background: var(--glass-fill-strong);
        -webkit-backdrop-filter: blur(34px) saturate(1.42);
        backdrop-filter: blur(34px) saturate(1.42);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.13),
          inset 0 -1px 0 rgba(255, 255, 255, 0.035),
          0 24px 80px rgba(0, 0, 0, 0.34);
      }

      .assistant-console.has-user .composer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: clamp(28px, 5vh, 54px);
        z-index: 3;
        order: 3;
        pointer-events: auto;
      }

      .composer > * {
        position: relative;
      }

      .prompt-input {
        width: 100%;
        height: 40px;
        border: 0;
        padding: 0 2px;
        background: transparent;
        color: var(--text-primary);
        font: inherit;
        font-size: 14px;
        line-height: 40px;
        letter-spacing: 0;
        outline: none;
      }

      .prompt-input::placeholder {
        color: rgba(242, 242, 238, 0.44);
      }

      .send-button {
        display: grid;
        place-items: center;
        width: 40px;
        min-width: 40px;
        height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.11);
        -webkit-backdrop-filter: blur(18px) saturate(1.18);
        backdrop-filter: blur(18px) saturate(1.18);
        color: var(--text-primary);
        cursor: pointer;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.14),
          0 0 24px rgba(255, 255, 255, 0.06);
        transition:
          background 160ms var(--ease-out),
          border-color 160ms var(--ease-out),
          box-shadow 160ms var(--ease-out);
      }

      .send-button:hover,
      .send-button:focus-visible {
        border-color: rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.16);
        outline: none;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          0 0 30px rgba(255, 255, 255, 0.1);
      }

      .send-icon {
        width: 16px;
        height: 16px;
      }

      .face-stage {
        position: relative;
        z-index: 2;
        width: min(58vw, 620px);
        aspect-ratio: 1 / 0.72;
        display: grid;
        place-items: center;
        animation: face-hide 4.85s steps(1, end) forwards;
      }

      .pixel-face {
        --eye-shift: 0px;
        position: relative;
        width: min(28vw, 260px);
        height: min(16vw, 148px);
        z-index: 2;
        transform-origin: 50% 50%;
        will-change: transform, opacity;
        animation: mascot-look 4.85s var(--ease-mascot) forwards;
      }

      .eye {
        position: absolute;
        top: 50%;
        width: 46px;
        height: 96px;
        border-radius: 5px;
        opacity: 0.92;
        display: grid;
        grid-template-columns: repeat(5, 5px);
        grid-auto-rows: 5px;
        align-content: center;
        justify-content: center;
        gap: 3px;
        overflow: hidden;
        transform-origin: 50% 50%;
        translate: 0 -50%;
        filter:
          drop-shadow(0 0 8px rgba(242, 242, 238, 0.34))
          drop-shadow(0 0 22px rgba(242, 242, 238, 0.16));
        will-change: transform, opacity;
        z-index: 2;
      }

      .eye-dot {
        display: grid;
        place-items: center;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(242, 242, 238, var(--o, 0.82));
        color: transparent;
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: 7px;
        font-weight: 700;
        line-height: 1;
        box-shadow:
          0 0 4px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.82)),
          0 0 12px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.44)),
          0 0 24px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.18));
      }

      .eye.is-booting .eye-dot {
        border-radius: 1px;
        background: rgba(242, 242, 238, 0.08);
        color: rgba(242, 242, 238, 0.96);
        box-shadow:
          0 0 5px rgba(242, 242, 238, 0.52),
          0 0 14px rgba(242, 242, 238, 0.2);
        text-shadow:
          0 0 5px rgba(242, 242, 238, 0.58),
          0 0 13px rgba(242, 242, 238, 0.24);
      }

      .eye-left {
        left: 22%;
        animation: eye-shape 4.85s var(--ease-mascot) forwards;
      }

      .eye-right {
        right: 22%;
        animation: eye-shape 4.85s var(--ease-mascot) forwards;
      }

      .eye-left .eye-dot {
        animation: led-power-left 4.85s linear forwards;
      }

      .eye-right .eye-dot {
        animation: led-power-right 4.85s linear forwards;
      }

      .eye-glow {
        position: absolute;
        top: 50%;
        width: 98px;
        height: 150px;
        translate: 0 -50%;
        z-index: 1;
        opacity: 0;
        pointer-events: none;
        border-radius: 999px;
        background: radial-gradient(
          ellipse at center,
          rgba(242, 242, 238, 0.38) 0%,
          rgba(242, 242, 238, 0.2) 28%,
          rgba(242, 242, 238, 0.08) 52%,
          transparent 76%
        );
        filter: blur(13px);
        transform-origin: 50% 50%;
        animation: eye-glow-bloom 4.85s var(--ease-mascot) forwards;
      }

      .glow-left {
        left: calc(22% - 26px);
      }

      .glow-right {
        right: calc(22% - 26px);
      }

      .brow {
        position: absolute;
        top: -18%;
        width: 62px;
        height: 18px;
        display: grid;
        grid-template-columns: repeat(7, 5px);
        grid-auto-rows: 5px;
        align-content: center;
        justify-content: center;
        gap: 3px;
        opacity: 0.66;
        filter: drop-shadow(0 0 8px rgba(242, 242, 238, 0.08));
        will-change: transform, opacity;
        z-index: 3;
      }

      .brow-left {
        left: 10%;
        animation: brow-left-lift 4.85s var(--ease-mascot) forwards;
      }

      .brow-right {
        right: 10%;
        animation: brow-right-lift 4.85s var(--ease-mascot) forwards;
      }

      .brow-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(242, 242, 238, var(--o, 0.58));
        box-shadow: 0 0 5px rgba(242, 242, 238, calc(var(--o, 0.58) * 0.16));
      }

      .boot-log {
        position: absolute;
        left: 50%;
        top: calc(50% + min(17vw, 172px));
        translate: -50% 0;
        z-index: 3;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 24ch minmax(0, 1fr);
        align-items: center;
        column-gap: 12px;
        width: min(560px, calc(100vw - 32px));
        min-width: 0;
        overflow: visible;
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: clamp(10px, 1.45vw, 13px);
        line-height: 1.4;
        letter-spacing: 0.055em;
        text-transform: uppercase;
        color: var(--text-primary);
        animation: boot-log-exit 4.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .boot-log::after {
        content: "";
        grid-column: 3;
      }

      .boot-kicker {
        grid-column: 1;
        justify-self: end;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text-muted);
      }

      .boot-led {
        flex: 0 0 auto;
        width: 6px;
        height: 6px;
        background: rgba(159, 255, 215, 0.8);
        border-radius: 50%;
        box-shadow:
          0 0 8px rgba(159, 255, 215, 0.46),
          0 0 18px rgba(159, 255, 215, 0.16);
        animation: status-led 4.85s steps(2, end) forwards;
      }

      .boot-label {
        flex: 0 0 auto;
      }

      .boot-status {
        grid-column: 2;
        position: relative;
        width: 24ch;
        height: 1.4em;
        overflow: hidden;
        text-align: center;
      }

      .status-text {
        position: absolute;
        inset: 0;
        opacity: 0;
        white-space: nowrap;
        text-align: center;
        transform: translateY(5px);
        animation: status-step 940ms var(--ease-out) var(--delay) forwards;
      }

      .status-text.final {
        font-weight: 700;
        letter-spacing: 0.08em;
        text-shadow:
          0 0 10px rgba(242, 242, 238, 0.42),
          0 0 24px rgba(242, 242, 238, 0.18);
        animation: status-final 1.8s var(--ease-out) var(--delay) forwards;
      }

      .reveal {
        min-height: 100vh;
        position: relative;
        z-index: 1;
        display: grid;
        align-items: end;
        padding: clamp(24px, 5vw, 80px);
        opacity: 0;
        transform: translateY(18px);
        animation: site-reveal 900ms cubic-bezier(0.22, 1, 0.36, 1) 4.72s forwards;
      }

      .reveal-content {
        position: relative;
        z-index: 2;
        width: min(980px, 100%);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
        margin: 0 0 24px;
        color: var(--text-muted);
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: 11px;
        line-height: 1.4;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .meta span {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .meta span::before {
        content: "";
        width: 5px;
        height: 5px;
        background: var(--signal-active);
        box-shadow: 0 0 16px rgba(159, 255, 215, 0.24);
      }

      h1 {
        max-width: 900px;
        margin: 0;
        font-size: clamp(52px, 9vw, 126px);
        line-height: 0.9;
        letter-spacing: 0;
        font-weight: 600;
      }

      .summary {
        max-width: 660px;
        margin: 28px 0 0;
        color: var(--text-secondary);
        font-size: clamp(17px, 2vw, 21px);
        line-height: 1.45;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 1px;
        width: min(980px, 100%);
        margin-top: clamp(40px, 8vw, 88px);

        }

        .boot-log {
          top: calc(50% + 33vw);
          grid-template-columns: minmax(0, 1fr) 22ch minmax(0, 1fr);

        .reveal {

        .loader.is-chatting .mascot-hold {

        }

        .assistant-console {

        }

        .assistant-console.has-user {

        }

        .assistant-console.has-user::after {
          width: calc(100vw - 16px);
          height: 300px;
          background: linear-gradient(
            180deg,
            transparent 0%,
            rgba(0, 0, 0, 0.42) 32%,
            rgba(0, 0, 0, 0.88) 72%,
            #000 100%
          );
        }

        .thread {
          gap: 8px;
          margin-bottom: 10px;
        }

        .assistant-console.has-user .thread {
          top: clamp(328px, calc(44vh + 8px), 392px);
          bottom: calc(clamp(28px, 5vh, 54px) + 246px);
          width: calc(100% + 16px);
          max-width: calc(100% + 16px);
          margin: 0 auto;
          padding: 0 8px 34px;
        }

        .message-bubble {
          max-width: 94%;
          border-radius: 24px;
          padding: 13px 14px 14px;
        }

        .agent-bubble {
          padding: 0 8px;
        }

        .assistant-console.has-user .agent-bubble {
          border-bottom-left-radius: 0;
          padding: 0 4px;
        }

        .user-bubble {
          border-bottom-right-radius: 8px;
        }

        .agent-message {
          font-size: 30px;
          line-height: 1.06;
        }

        .assistant-console.has-user .agent-message {
          font-size: 16px;
          line-height: 1.3;
        }

        .case-preview-rail {
          gap: 9px;
          margin-top: 12px;
          padding-bottom: 7px;
        }

        .case-card {
          flex-basis: min(72vw, 218px);
          grid-template-rows: 86px minmax(112px, auto);
          min-height: 210px;
        }

        .case-preview-art {
          min-height: 86px;
        }

        .case-art-grid {

        }

        .case-art-cell {
          height: 16px;
        }

        .case-art-bars {
          left: 16px;
          right: 16px;
          bottom: 14px;
          height: 34px;
        }

        .case-art-path {
          left: 16px;
          right: 16px;
          top: 25px;
          height: 30px;
        }

        .case-card-body {
          padding: 11px 12px 12px;
        }

        .case-card-source {
          font-size: 11px;
        }

        .case-card-title {
          min-height: 3.9em;
          font-size: 14px;
          line-height: 1.3;
        }

        .case-card-meta {
          margin-top: 12px;
          font-size: 10px;
        }

        .user-message {
          font-size: 14px;
        }

        .followup-rail {
          width: 100%;
          margin-top: 10px;
        }

        .followups {
          display: grid;
          grid-template-columns: 1fr;
          gap: 7px;
          margin: 0;
          padding: 0;
          overflow: visible;
          -webkit-mask-image: none;
          mask-image: none;
        }

        .followup-scroll {
          display: none;
        }

        .followup {
          flex-basis: auto;
          width: 100%;
          max-width: none;
          min-height: 42px;
          border-radius: 21px;
          padding: 9px 10px 9px 14px;
          font-size: 14px;
        }

        .followup:nth-child(n + 5) {
          display: none;
        }

        .composer {
          grid-template-columns: minmax(0, 1fr) auto;
          gap: 8px;
          width: 100%;
          border-radius: 32px;
          padding: 8px 8px 8px 16px;

        .prompt-input {
          height: 42px;
          padding: 8px 2px;

        .send-button {

          height: 42px;
        }

        .send-icon {

          height: 16px;
        }

        .metrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .metric {
          min-height: 112px;
          padding: 16px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-delay: 0ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }

        .reveal {
          opacity: 1;
          transform: none;
        }

        .assistant-console {
          opacity: 1;
          transform: translate3d(-50%, var(--console-y-end), 0);
        }

        .mascot-hold {

        }
      }

  <body>
    <main class="site-shell">
      <section class="loader" aria-label="Opening animation">
        <video
          class="loader-video"
          src="assets/loader-intro.mp4?v=chat-entry-2"
          autoplay
          muted
          playsinline
          preload="auto"
          aria-hidden="true"
        ></video>
        <button
          class="mascot-hold chat-mascot"
          type="button"
          data-state="sleep"
          aria-label="Wake Tim's portfolio assistant"
        >
          <video
            class="mascot-video"
            id="mascot-video"
            src="assets/mascot-sleep-loop.mp4?v=video-clips-4"
            autoplay
            muted
            loop
            playsinline
            preload="auto"
            aria-hidden="true"
          ></video>
        </button>
        <div class="assistant-console" aria-label="AI portfolio chat">
          <div class="thread" aria-live="polite">
            <div class="message-row user" id="user-message-row" hidden>
              <div class="message-bubble user-bubble">
                <p class="user-message" id="user-message"></p>
              </div>
            </div>
            <div class="message-row agent">
              <div class="message-bubble agent-bubble">
                <span class="agent-name">Assistant</span>
                <p class="agent-message" id="assistant-message">
                  Ask me about Tim
                </p>
                <div
                  class="case-preview-rail"
                  id="case-preview-rail"
                  aria-label="Selected case previews"
                  hidden
                ></div>
              </div>
            </div>
          </div>
          <form class="composer" aria-label="Ask Tim's portfolio agent">
            <input
              class="prompt-input"
              id="portfolio-prompt"
              type="text"
              placeholder="Ask anything about Tim's work..."
            />
            <button class="send-button" type="submit" aria-label="Send prompt">
              <svg class="send-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 19V5m0 0-6 6m6-6 6 6"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2.4"
                />
              </svg>
            </button>
          </form>
          <div class="followup-rail">
            <div class="followups" aria-label="Suggested follow-up questions">
              <button
                class="followup"
                type="button"
                data-prompt="Show me Tim's work."
                data-response="Start with selected case studies: platform systems, gaming growth, fintech distribution, and AI-enabled design workflows."
                data-enrichment="cases"
              >
                <span class="followup-text">See work</span>
                <span class="followup-arrow" aria-hidden="true">→</span>
              </button>
              <button
                class="followup"
                type="button"
                data-prompt="Tell me about Tim's experience."
                data-response="Tim's strongest signal is lead-level product design: shipped products, business metrics, design systems, research operations, and close engineering partnership."
              >
                <span class="followup-text">Experience</span>
                <span class="followup-arrow" aria-hidden="true">→</span>
              </button>
              <button
                class="followup"
                type="button"
                data-prompt="How can I connect with Tim?"
                data-response="Best next step: reach out directly for portfolio context, case walkthroughs, availability, or a focused Revolut-style review."
              >
                <span class="followup-text">Contact Tim</span>
                <span class="followup-arrow" aria-hidden="true">→</span>
              </button>
              <button
                class="followup"
                type="button"
                data-prompt="Download Tim's CV."
                data-response="I'll surface the CV as a downloadable file here once the latest PDF is connected to the site."
              >
                <span class="followup-text">Download CV</span>
                <span class="followup-arrow" aria-hidden="true">→</span>
              </button>
            </div>
            <button
              class="followup-scroll prev"
              type="button"
              data-direction="prev"
              aria-label="Scroll suggestions left"
              hidden
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M15 18l-6-6 6-6"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2.4"
                />
              </svg>
            </button>
            <button
              class="followup-scroll next"
              type="button"
              data-direction="next"
              aria-label="Scroll suggestions right"
              hidden
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M9 6l6 6-6 6"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2.4"
                />
              </svg>
            </button>
          </div>
        </div>
      </section>
    </main>
    <script>
      const assistantMessage = document.querySelector("#assistant-message");
      const assistantConsole = document.querySelector(".assistant-console");
      const loader = document.querySelector(".loader");
      const thread = document.querySelector(".thread");
      const casePreviewRail = document.querySelector("#case-preview-rail");
      const userMessage = document.querySelector("#user-message");
      const userMessageRow = document.querySelector("#user-message-row");
      const promptInput = document.querySelector("#portfolio-prompt");
      const promptButtons = document.querySelectorAll(".followup");
      const followupRail = document.querySelector(".followup-rail");
      const followups = document.querySelector(".followups");
      const followupScrollButtons = document.querySelectorAll(".followup-scroll");
      const composer = document.querySelector(".composer");
      const sendButton = document.querySelector(".send-button");
      const mascot = document.querySelector(".chat-mascot");
      const mascotVideo = document.querySelector("#mascot-video");
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const mascotClips = {
        sleep: {
          src: "assets/mascot-sleep-loop.mp4?v=video-clips-4",
          loop: true,
        },
        awake: {
          src: "assets/mascot-awake-loop.mp4?v=video-clips-4",
          loop: true,
        },
        wake: {
          src: "assets/mascot-wake.mp4?v=video-clips-4",
          loop: false,
        },
        lookInput: {
          src: "assets/mascot-look-input.mp4?v=video-clips-4",
          loop: false,
        },
        input: {
          src: "assets/mascot-input-loop.mp4?v=video-clips-4",
          loop: true,
        },
        fallAsleep: {
          src: "assets/mascot-fall-asleep.mp4?v=video-clips-4",
          loop: false,
        },
        startle: {
          src: "assets/mascot-startle.mp4?v=video-clips-4",
          loop: false,
        },
        send: {
          src: "assets/mascot-send.mp4?v=video-clips-4",
          loop: false,
        },
      };
      let mascotMode = "sleep";
      let mascotReturnMode = "sleep";
      let mascotActionActive = false;
      let mascotIdleTimer;
      const caseStudies = [
        {
          id: "systems",
          source: "Case 01",
          title: "Platform systems for faster product launches",
          meta: "Systems / 2024",
          variant: "systems",
          bars: [42, 58, 82, 46, 64, 90],
          detail:
            "Platform systems case: reusable interaction patterns, tighter design-engineering handoff, and cleaner launch decisions across complex product surfaces.",
        },
        {
          id: "growth",
          source: "Case 02",
          title: "Gaming growth loops from onboarding to live ops",
          meta: "Growth / 2023",
          variant: "growth",
          bars: [34, 48, 68, 76, 58, 86],
          detail:
            "Gaming growth case: activation, retention loops, and live-ops UX shaped around fast experiments and readable player signals.",
        },
        {
          id: "fintech",
          source: "Case 03",
          title: "Fintech distribution path with clearer conversion",
          meta: "Fintech / 2024",
          variant: "fintech",
          bars: [52, 36, 62, 74, 80, 66],
          detail:
            "Fintech distribution case: acquisition and product education flows made sharper, lower-friction, and easier to evaluate with business metrics.",
        },
        {
          id: "ai",
          source: "Case 04",
          title: "AI-enabled design workflow from brief to prototype",
          meta: "AI workflow / 2025",
          variant: "ai",
          bars: [38, 54, 44, 72, 88, 78],
          detail:
            "AI workflow case: a practical design pipeline that turns fuzzy briefs into structured exploration, prototype states, and implementation-ready decisions.",
        },
      ];

      const caseIntentPattern =
        /(case|cases|work|portfolio|project|projects|кей|кейсы|работ|портфолио|проект)/i;

      const updateFollowupFade = () => {
        const maxScroll = Math.max(0, followups.scrollWidth - followups.clientWidth);
        const scrollLeft = Math.round(followups.scrollLeft);
        const hasOverflow = maxScroll > 1;
        const isAtStart = maxScroll <= 1 || scrollLeft <= 1;
        const isAtEnd = maxScroll <= 1 || scrollLeft >= maxScroll - 1;

        followups.classList.toggle("has-overflow", hasOverflow);
        followups.classList.toggle("is-at-start", isAtStart);
        followups.classList.toggle("is-at-end", isAtEnd);
        followupRail.classList.toggle("has-overflow", hasOverflow);

        followupScrollButtons.forEach((button) => {
          const direction = button.dataset.direction;
          button.hidden =
            !hasOverflow ||
            (direction === "prev" && isAtStart) ||
            (direction === "next" && isAtEnd);
        });
      };

      const updateThreadFade = () => {
        const maxScroll = Math.max(0, thread.scrollHeight - thread.clientHeight);
        const scrollTop = Math.round(thread.scrollTop);

        thread.classList.toggle("is-scrollable", maxScroll > 1);
        thread.classList.toggle("is-scrolled", scrollTop > 1);
      };

      const scrollFollowups = (direction) => {
        const distance = Math.max(180, followups.clientWidth * 0.68);

        followups.scrollBy({
          left: direction * distance,
          behavior: reduceMotion ? "auto" : "smooth",
        });
        window.setTimeout(updateFollowupFade, reduceMotion ? 0 : 260);
      };

      const renderCaseArt = (caseStudy) => {
        const bars = caseStudy.bars
          .map(
            (height) =>
              `<span class="case-art-bar" style="--bar-height: ${height}%"></span>`,
          )
          .join("");

        if (caseStudy.variant === "systems") {
          return `
            <span class="case-art-grid" aria-hidden="true">
              ${Array.from({ length: 8 }, () => '<span class="case-art-cell"></span>').join("")}
            </span>
          `;
        }

        if (caseStudy.variant === "fintech") {
          return '<span class="case-art-path" aria-hidden="true"></span>';
        }

        return `<span class="case-art-bars" aria-hidden="true">${bars}</span>`;
      };

      const renderCaseCard = (caseStudy, index, activeCaseId = "") => `
        <button
          class="case-card${caseStudy.id === activeCaseId ? " is-active" : ""}"
          type="button"
          data-case-id="${caseStudy.id}"
          data-variant="${caseStudy.variant}"
          style="--card-index: ${index}"
          aria-label="${caseStudy.source}: ${caseStudy.title}"
        >
          <span class="case-preview-art" data-variant="${caseStudy.variant}" aria-hidden="true">
            ${renderCaseArt(caseStudy)}
          </span>
          <span class="case-card-body">
            <span class="case-card-source">${caseStudy.source}</span>
            <span class="case-card-title">${caseStudy.title}</span>
            <span class="case-card-meta">${caseStudy.meta}</span>
          </span>
        </button>
      `;

      const renderCaseCards = (activeCaseId = "") => {
        casePreviewRail.innerHTML = caseStudies
          .map((caseStudy, index) => renderCaseCard(caseStudy, index, activeCaseId))
          .join("");

        casePreviewRail.hidden = false;
        assistantConsole.classList.add("has-enrichment");
      };

      const hideCaseCards = () => {
        casePreviewRail.hidden = true;
        casePreviewRail.innerHTML = "";
        assistantConsole.classList.remove("has-enrichment");
      };

      const getExchangeForPrompt = (prompt) => {
        if (caseIntentPattern.test(prompt)) {
          return {
            response:
              "Start with selected case studies: platform systems, gaming growth, fintech distribution, and AI-enabled design workflows.",
            enrichment: "cases",
          };
        }

        return {
          response: `I'll route this as a portfolio brief: ${prompt}`,
          enrichment: "",
        };
      };

      const setMascotClip = (clipName, options = {}) => {
        const clip = mascotClips[clipName];

        if (!clip) {
          return;
        }

        window.clearTimeout(mascotIdleTimer);

        if (mascotVideo.dataset.clip !== clipName) {
          mascotVideo.dataset.clip = clipName;
          mascotVideo.src = clip.src;
          mascotVideo.load();
        }

        mascotMode = clipName;
        mascot.dataset.state = clipName;
        mascotVideo.loop = clip.loop;

        if (options.restart !== false) {
          try {
            mascotVideo.currentTime = 0;
          } catch {
            // Some mobile browsers only allow seeking after metadata is ready.
          }
        }

        mascotVideo.play().catch(() => {});

        if (clip.loop && clipName === "awake") {
          scheduleMascotSleep();
        }
      };

      const playMascotAction = (clipName, nextClip = "awake") => {
        if (mascotActionActive && mascotMode === clipName) {
          return;
        }

        mascotActionActive = true;
        mascotReturnMode = nextClip;
        setMascotClip(clipName);
      };

      const scheduleMascotSleep = () => {
        window.clearTimeout(mascotIdleTimer);

        if (reduceMotion || document.activeElement === promptInput) {
          return;
        }

        mascotIdleTimer = window.setTimeout(() => {
          if (!mascotActionActive && document.activeElement !== promptInput) {
            playMascotAction("fallAsleep", "sleep");
          }
        }, 8500);
      };

      const restoreMascotMode = () => {
        const nextClip =
          mascotReturnMode === "input" && document.activeElement !== promptInput
            ? "awake"
            : mascotReturnMode;

        mascotActionActive = false;

        if (nextClip === "lookInput") {
          playMascotAction("lookInput", "input");
          return;
        }

        setMascotClip(nextClip, { restart: nextClip === "input" });
      };

      mascotVideo.addEventListener("ended", () => {
        if (!mascotActionActive) {
          return;
        }

        restoreMascotMode();
      });

      Object.values(mascotClips).forEach((clip) => {
        const video = document.createElement("video");
        video.src = clip.src;
        video.muted = true;
        video.playsInline = true;
        video.preload = "auto";
      });

      const watchInput = () => {
        mascotReturnMode = "input";

        if (mascotActionActive) {
          return;
        }

        window.clearTimeout(mascotIdleTimer);

        if (mascotMode === "input") {
          return;
        }

        if (mascotMode === "sleep") {
          playMascotAction("wake", "lookInput");
          return;
        }

        playMascotAction("lookInput", "input");
      };

      const leaveInput = () => {
        mascotReturnMode = "awake";

        if (mascotActionActive) {
          return;
        }

        setMascotClip("awake", { restart: false });
      };

      const showExchange = (prompt, response, options = {}) => {
        loader.classList.add("is-chatting");
        assistantConsole.classList.add("has-user");
        userMessage.textContent = prompt;
        userMessageRow.hidden = false;
        assistantMessage.textContent = response;

        if (options.enrichment === "cases") {
          renderCaseCards(options.activeCaseId);
        } else {
          hideCaseCards();
        }

        promptInput.value = "";
        window.requestAnimationFrame(() => {
          thread.scrollTop = 0;
          updateThreadFade();
          updateFollowupFade();
        });
      };

      casePreviewRail.addEventListener("click", (event) => {
        const card = event.target.closest(".case-card");

        if (!card) {
          return;
        }

        const caseStudy = caseStudies.find((item) => item.id === card.dataset.caseId);

        if (!caseStudy) {
          return;
        }

        showExchange(caseStudy.title, caseStudy.detail, {
          enrichment: "cases",
          activeCaseId: caseStudy.id,
        });
        playMascotAction("send", "input");
      });

      promptButtons.forEach((button) => {
        button.addEventListener("click", () => {
          promptButtons.forEach((item) => item.classList.remove("is-active"));
          button.classList.add("is-active");
          promptInput.value = button.dataset.prompt;
          showExchange(button.dataset.prompt, button.dataset.response, {
            enrichment: button.dataset.enrichment,
          });
          button.classList.add("is-used");
          window.requestAnimationFrame(updateFollowupFade);
          playMascotAction("send", "input");
          promptInput.focus({ preventScroll: true });
        });
      });

      composer.addEventListener("submit", (event) => {
        event.preventDefault();
        const prompt = promptInput.value.trim();

        if (!prompt) {
          promptInput.focus({ preventScroll: true });
          return;
        }

        playMascotAction("send", "input");
        promptButtons.forEach((item) => item.classList.remove("is-active"));
        const exchange = getExchangeForPrompt(prompt);
        showExchange(prompt, exchange.response, { enrichment: exchange.enrichment });
      });

      mascot.addEventListener("click", () => {
        if (mascotMode === "sleep" || mascotMode === "fallAsleep") {
          playMascotAction("wake", "awake");
          return;
        }

        if (mascotActionActive) {
          return;
        }

        if (mascotMode === "awake" || mascotMode === "input") {
          playMascotAction("startle", document.activeElement === promptInput ? "input" : "awake");
        }
      });
      promptInput.addEventListener("focus", watchInput);
      promptInput.addEventListener("input", watchInput);
      promptInput.addEventListener("blur", () => {
        window.setTimeout(() => {
          if (document.activeElement !== promptInput) {
            leaveInput();
          }
        }, 90);
      });
      sendButton.addEventListener("pointerdown", () => playMascotAction("send", "input"));
      sendButton.addEventListener("focus", () => playMascotAction("send", "input"));
      followupScrollButtons.forEach((button) => {
        button.addEventListener("click", () => {
          scrollFollowups(button.dataset.direction === "next" ? 1 : -1);
        });
      });
      followups.addEventListener("scroll", updateFollowupFade, { passive: true });
      thread.addEventListener("scroll", updateThreadFade, { passive: true });
      window.addEventListener("resize", () => {
        updateFollowupFade();
        updateThreadFade();
      });
      window.addEventListener("load", () => {
        updateFollowupFade();
        updateThreadFade();
      });
      updateFollowupFade();
      updateThreadFade();
      setMascotClip("sleep", { restart: false });
    </script>
  </body>
</html>
