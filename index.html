<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tamirlan Askar - Loading Prototype</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23111111'/%3E%3Crect x='4' y='6' width='3' height='2' fill='%23F2F2EE'/%3E%3Crect x='9' y='6' width='3' height='2' fill='%23F2F2EE'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        --bg-page: #000000;
        --bg-panel: #090909;
        --text-primary: #f2f2ee;
        --text-secondary: #a6a6a0;
        --text-muted: #70706a;
        --border-subtle: #252521;
        --border-default: #34342e;
        --signal-active: #9fffd7;
        --signal-dim: #4fd6b0;
        --pixel: rgba(242, 242, 238, 0.82);
        --pixel-dim: rgba(242, 242, 238, 0.18);
        --scan: rgba(242, 242, 238, 0.055);
        --shadow: rgba(0, 0, 0, 0.56);
        --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-in: cubic-bezier(0.7, 0, 0.84, 0);
        --ease-mascot: cubic-bezier(0.45, 0, 0.2, 1);
        font-family: Inter, Manrope, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text-primary);
        background: var(--bg-page);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: var(--bg-page);
      }

      body {
        overflow-x: hidden;
      }

      button,
      a {
        font: inherit;
      }

      .site-shell {
        min-height: 100vh;
        position: relative;
        isolation: isolate;
        overflow-x: hidden;
        background: var(--bg-page);
      }

      .loader {
        position: relative;
        z-index: 20;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg-page);
        overflow: hidden;
      }

      .loader::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        z-index: 1;
        height: 46%;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.94));
        pointer-events: none;
      }

      .loader-video {
        position: absolute;
        inset: 0;
        z-index: 2;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
        pointer-events: none;
      }

      .face-stage {
        position: relative;
        z-index: 2;
        width: min(58vw, 620px);
        aspect-ratio: 1 / 0.72;
        display: grid;
        place-items: center;
        animation: face-hide 4.85s steps(1, end) forwards;
      }

      .pixel-face {
        --eye-shift: 0px;
        position: relative;
        width: min(28vw, 260px);
        height: min(16vw, 148px);
        z-index: 2;
        transform-origin: 50% 50%;
        will-change: transform, opacity;
        animation: mascot-look 4.85s var(--ease-mascot) forwards;
      }

      .eye {
        position: absolute;
        top: 50%;
        width: 46px;
        height: 96px;
        border-radius: 5px;
        opacity: 0.92;
        display: grid;
        grid-template-columns: repeat(5, 5px);
        grid-auto-rows: 5px;
        align-content: center;
        justify-content: center;
        gap: 3px;
        overflow: hidden;
        transform-origin: 50% 50%;
        translate: 0 -50%;
        filter:
          drop-shadow(0 0 8px rgba(242, 242, 238, 0.34))
          drop-shadow(0 0 22px rgba(242, 242, 238, 0.16));
        will-change: transform, opacity;
        z-index: 2;
      }

      .eye-dot {
        display: grid;
        place-items: center;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(242, 242, 238, var(--o, 0.82));
        color: transparent;
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: 7px;
        font-weight: 700;
        line-height: 1;
        box-shadow:
          0 0 4px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.82)),
          0 0 12px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.44)),
          0 0 24px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.18));
      }

      .eye.is-booting .eye-dot {
        border-radius: 1px;
        background: rgba(242, 242, 238, 0.08);
        color: rgba(242, 242, 238, 0.96);
        box-shadow:
          0 0 5px rgba(242, 242, 238, 0.52),
          0 0 14px rgba(242, 242, 238, 0.2);
        text-shadow:
          0 0 5px rgba(242, 242, 238, 0.58),
          0 0 13px rgba(242, 242, 238, 0.24);
      }

      .eye-left {
        left: 22%;
        animation: eye-shape 4.85s var(--ease-mascot) forwards;
      }

      .eye-right {
        right: 22%;
        animation: eye-shape 4.85s var(--ease-mascot) forwards;
      }

      .eye-left .eye-dot {
        animation: led-power-left 4.85s linear forwards;
      }

      .eye-right .eye-dot {
        animation: led-power-right 4.85s linear forwards;
      }

      .eye-glow {
        position: absolute;
        top: 50%;
        width: 98px;
        height: 150px;
        translate: 0 -50%;
        z-index: 1;
        opacity: 0;
        pointer-events: none;
        border-radius: 999px;
        background: radial-gradient(
          ellipse at center,
          rgba(242, 242, 238, 0.38) 0%,
          rgba(242, 242, 238, 0.2) 28%,
          rgba(242, 242, 238, 0.08) 52%,
          transparent 76%
        );
        filter: blur(13px);
        transform-origin: 50% 50%;
        animation: eye-glow-bloom 4.85s var(--ease-mascot) forwards;
      }

      .glow-left {
        left: calc(22% - 26px);
      }

      .glow-right {
        right: calc(22% - 26px);
      }

      .brow {
        position: absolute;
        top: -18%;
        width: 62px;
        height: 18px;
        display: grid;
        grid-template-columns: repeat(7, 5px);
        grid-auto-rows: 5px;
        align-content: center;
        justify-content: center;
        gap: 3px;
        opacity: 0.66;
        filter: drop-shadow(0 0 8px rgba(242, 242, 238, 0.08));
        will-change: transform, opacity;
        z-index: 3;
      }

      .brow-left {
        left: 10%;
        animation: brow-left-lift 4.85s var(--ease-mascot) forwards;
      }

      .brow-right {
        right: 10%;
        animation: brow-right-lift 4.85s var(--ease-mascot) forwards;
      }

      .brow-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(242, 242, 238, var(--o, 0.58));
        box-shadow: 0 0 5px rgba(242, 242, 238, calc(var(--o, 0.58) * 0.16));
      }

      .boot-log {
        position: absolute;
        left: 50%;
        top: calc(50% + min(17vw, 172px));
        translate: -50% 0;
        z-index: 3;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 24ch minmax(0, 1fr);
        align-items: center;
        column-gap: 12px;
        width: min(560px, calc(100vw - 32px));
        min-width: 0;
        overflow: visible;
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: clamp(10px, 1.45vw, 13px);
        line-height: 1.4;
        letter-spacing: 0.055em;
        text-transform: uppercase;
        color: var(--text-primary);
        animation: boot-log-exit 4.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .boot-log::after {
        content: "";
        grid-column: 3;
      }

      .boot-kicker {
        grid-column: 1;
        justify-self: end;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text-muted);
      }

      .boot-led {
        flex: 0 0 auto;
        width: 6px;
        height: 6px;
        background: rgba(159, 255, 215, 0.8);
        border-radius: 50%;
        box-shadow:
          0 0 8px rgba(159, 255, 215, 0.46),
          0 0 18px rgba(159, 255, 215, 0.16);
        animation: status-led 4.85s steps(2, end) forwards;
      }

      .boot-label {
        flex: 0 0 auto;
      }

      .boot-status {
        grid-column: 2;
        position: relative;
        width: 24ch;
        height: 1.4em;
        overflow: hidden;
        text-align: center;
      }

      .status-text {
        position: absolute;
        inset: 0;
        opacity: 0;
        white-space: nowrap;
        text-align: center;
        transform: translateY(5px);
        animation: status-step 940ms var(--ease-out) var(--delay) forwards;
      }

      .status-text.final {
        font-weight: 700;
        letter-spacing: 0.08em;
        text-shadow:
          0 0 10px rgba(242, 242, 238, 0.42),
          0 0 24px rgba(242, 242, 238, 0.18);
        animation: status-final 1.8s var(--ease-out) var(--delay) forwards;
      }

      .reveal {
        min-height: 100vh;
        position: relative;
        z-index: 1;
        display: grid;
        align-items: end;
        padding: clamp(24px, 5vw, 80px);
        opacity: 0;
        transform: translateY(18px);
        animation: site-reveal 900ms cubic-bezier(0.22, 1, 0.36, 1) 4.72s forwards;
      }

      .reveal-content {
        position: relative;
        z-index: 2;
        width: min(980px, 100%);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
        margin: 0 0 24px;
        color: var(--text-muted);
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: 11px;
        line-height: 1.4;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .meta span {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .meta span::before {
        content: "";
        width: 5px;
        height: 5px;
        background: var(--signal-active);
        box-shadow: 0 0 16px rgba(159, 255, 215, 0.24);
      }

      h1 {
        max-width: 900px;
        margin: 0;
        font-size: clamp(52px, 9vw, 126px);
        line-height: 0.9;
        letter-spacing: 0;
        font-weight: 600;
      }

      .summary {
        max-width: 660px;
        margin: 28px 0 0;
        color: var(--text-secondary);
        font-size: clamp(17px, 2vw, 21px);
        line-height: 1.45;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 1px;
        width: min(980px, 100%);
        margin-top: clamp(40px, 8vw, 88px);
        border: 1px solid var(--border-subtle);
        background: var(--border-subtle);
      }

      .metric {
        min-height: 128px;
        padding: 20px;
        background: rgba(21, 21, 21, 0.9);
      }

      .metric strong {
        display: block;
        color: var(--text-primary);
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: clamp(28px, 4vw, 56px);
        line-height: 0.95;
        font-weight: 600;
        letter-spacing: 0;
      }

      .metric span {
        display: block;
        margin-top: 12px;
        color: var(--text-muted);
        font-family: "IBM Plex Mono", "JetBrains Mono", SFMono-Regular, Consolas, monospace;
        font-size: 11px;
        line-height: 1.4;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      @keyframes mascot-look {
        0% {
          opacity: 0;
          transform: translate3d(0, 14px, 0) scale(0.96) perspective(520px) rotateY(0deg) rotateZ(0deg);
        }
        10%,
        15% {
          opacity: 1;
          transform: translate3d(0, 0, 0) scale(1) perspective(520px) rotateY(0deg) rotateZ(0deg);
        }
        18% {
          transform: translate3d(-3px, 0, 0) scale(1) perspective(520px) rotateY(-4deg) rotateZ(0deg);
        }
        27%,
        41% {
          transform: translate3d(-16px, 0, 0) scale(1) perspective(520px) rotateY(-18deg) rotateZ(-0.35deg);
        }
        47% {
          transform: translate3d(6px, 0, 0) scale(1) perspective(520px) rotateY(7deg) rotateZ(0deg);
        }
        53%,
        64% {
          transform: translate3d(16px, 0, 0) scale(1) perspective(520px) rotateY(18deg) rotateZ(0.35deg);
        }
        69% {
          transform: translate3d(0, 0, 0) scale(1) perspective(520px) rotateY(0deg) rotateZ(0deg);
        }
        73% {
          transform: translate3d(0, 2px, 0) scaleX(1.02) scaleY(0.98) perspective(520px) rotateY(0deg) rotateZ(0deg);
        }
        79% {
          transform: translate3d(0, -7px, 0) scaleX(1.08) scaleY(1.04) perspective(520px) rotateY(0deg) rotateZ(0deg);
        }
        86% {
          opacity: 1;
          transform: translate3d(0, 68px, 0) scaleX(0.84) scaleY(0.3) perspective(520px) rotateY(0deg) rotateZ(0deg);
        }
        100% {
          opacity: 0;
          transform: translate3d(0, 124px, 0) scaleX(0.78) scaleY(0.18) perspective(520px) rotateY(0deg) rotateZ(0deg);
        }
      }

      @keyframes eye-shape {
        0% {
          opacity: 0;
          transform: scaleX(0.92) scaleY(0.05);
        }
        4% {
          opacity: 0.22;
          transform: scaleX(0.95) scaleY(0.08);
        }
        8% {
          opacity: 0.46;
          transform: scaleX(0.98) scaleY(0.18);
        }
        13% {
          opacity: 0.92;
          transform: scaleX(1.03) scaleY(1.04);
        }
        18%,
        69% {
          opacity: 0.9;
          transform: scaleX(1) scaleY(1);
        }
        75% {
          opacity: 1;
          transform: scaleX(1.12) scaleY(1.08);
        }
        82% {
          opacity: 0.7;
          transform: scaleX(1) scaleY(0.28);
        }
        86%,
        100% {
          opacity: 0.32;
          transform: scaleX(0.84) scaleY(0.1);
        }
      }

      @keyframes led-power-left {
        0%,
        2% {
          background: rgba(242, 242, 238, calc(var(--o, 0.82) * 0.06));
          box-shadow: none;
        }
        4%,
        6% {
          background: rgba(242, 242, 238, var(--o, 0.82));
          box-shadow:
            0 0 5px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.9)),
            0 0 16px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.54)),
            0 0 32px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.24));
        }
        8% {
          background: rgba(242, 242, 238, calc(var(--o, 0.82) * 0.22));
          box-shadow: 0 0 3px rgba(242, 242, 238, 0.08);
        }
        10% {
          background: rgba(242, 242, 238, var(--o, 0.82));
          box-shadow:
            0 0 5px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.82)),
            0 0 14px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.48)),
            0 0 28px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.2));
        }
        14%,
        100% {
          background: rgba(242, 242, 238, var(--o, 0.82));
          box-shadow:
            0 0 4px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.82)),
            0 0 12px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.44)),
            0 0 24px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.18));
        }
      }

      @keyframes led-power-right {
        0%,
        4% {
          background: rgba(242, 242, 238, calc(var(--o, 0.82) * 0.06));
          box-shadow: none;
        }
        6%,
        8% {
          background: rgba(242, 242, 238, var(--o, 0.82));
          box-shadow:
            0 0 5px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.9)),
            0 0 16px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.54)),
            0 0 32px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.24));
        }
        10% {
          background: rgba(242, 242, 238, calc(var(--o, 0.82) * 0.26));
          box-shadow: 0 0 3px rgba(242, 242, 238, 0.08);
        }
        12% {
          background: rgba(242, 242, 238, var(--o, 0.82));
          box-shadow:
            0 0 5px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.82)),
            0 0 14px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.48)),
            0 0 28px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.2));
        }
        15%,
        100% {
          background: rgba(242, 242, 238, var(--o, 0.82));
          box-shadow:
            0 0 4px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.82)),
            0 0 12px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.44)),
            0 0 24px rgba(242, 242, 238, calc(var(--o, 0.82) * 0.18));
        }
      }

      @keyframes eye-glow-bloom {
        0% {
          opacity: 0;
          transform: scaleX(0.66) scaleY(0.12);
        }
        5% {
          opacity: 0.5;
          transform: scaleX(0.78) scaleY(0.2);
        }
        9% {
          opacity: 0.18;
          transform: scaleX(0.88) scaleY(0.34);
        }
        13% {
          opacity: 0.54;
          transform: scaleX(1.02) scaleY(0.86);
        }
        18%,
        41% {
          opacity: 0.46;
          transform: scaleX(1.08) scaleY(1);
        }
        47% {
          opacity: 0.22;
          transform: scaleX(0.92) scaleY(0.94);
        }
        53%,
        64% {
          opacity: 0.48;
          transform: scaleX(1.08) scaleY(1);
        }
        69% {
          opacity: 0.28;
          transform: scaleX(1) scaleY(0.95);
        }
        75% {
          opacity: 0.66;
          transform: scaleX(1.18) scaleY(1.08);
        }
        82% {
          opacity: 0.18;
          transform: scaleX(0.98) scaleY(0.32);
        }
        88%,
        100% {
          opacity: 0;
          transform: scaleX(0.74) scaleY(0.1);
        }
      }

      @keyframes brow-left-lift {
        0%,
        16% {
          opacity: 0.52;
          transform: translate3d(0, 0, 0) rotateZ(0deg) scaleX(0.96);
        }
        18%,
        23% {
          opacity: 0.82;
          transform: translate3d(0, -20px, 0) rotateZ(0deg) scaleX(1.02);
        }
        24%,
        41% {
          opacity: 0.82;
          transform: translate3d(0, -20px, 0) rotateZ(0deg) scaleX(1.02);
        }
        47%,
        69% {
          opacity: 0.5;
          transform: translate3d(0, 0, 0) rotateZ(0deg) scaleX(0.96);
        }
        72%,
        79% {
          opacity: 0.88;
          transform: translate3d(0, -24px, 0) rotateZ(0deg) scaleX(1.02);
        }
        86%,
        100% {
          opacity: 0.2;
          transform: translate3d(0, 18px, 0) rotateZ(0deg) scaleX(0.8);
        }
      }

      @keyframes brow-right-lift {
        0%,
        41% {
          opacity: 0.48;
          transform: translate3d(0, 0, 0) rotateZ(0deg) scaleX(0.96);
        }
        45%,
        51% {
          opacity: 0.84;
          transform: translate3d(0, -20px, 0) rotateZ(0deg) scaleX(1.02);
        }
        52%,
        64% {
          opacity: 0.84;
          transform: translate3d(0, -20px, 0) rotateZ(0deg) scaleX(1.02);
        }
        68%,
        69% {
          opacity: 0.52;
          transform: translate3d(0, 0, 0) rotateZ(0deg) scaleX(0.96);
        }
        72%,
        79% {
          opacity: 0.88;
          transform: translate3d(0, -24px, 0) rotateZ(0deg) scaleX(1.02);
        }
        86%,
        100% {
          opacity: 0.2;
          transform: translate3d(0, 18px, 0) rotateZ(0deg) scaleX(0.8);
        }
      }

      @keyframes face-hide {
        0%,
        88% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      @keyframes status-step {
        0% {
          opacity: 0;
          transform: translateY(5px);
        }
        16%,
        72% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateY(-4px);
        }
      }

      @keyframes status-final {
        0% {
          opacity: 0;
          transform: translateY(5px) scale(0.98);
        }
        14% {
          opacity: 1;
          transform: translateY(0) scale(1.045);
        }
        32%,
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes status-led {
        0%,
        8% {
          opacity: 0.18;
          transform: scale(0.7);
        }
        12%,
        72% {
          opacity: 1;
          transform: scale(1);
        }
        76%,
        100% {
          opacity: 0.76;
          transform: scale(0.86);
        }
      }

      @keyframes boot-log-exit {
        0%,
        84% {
          opacity: 1;
          transform: translateY(0);
        }
        94%,
        100% {
          opacity: 0;
          transform: translateY(24px);
        }
      }

      @keyframes site-reveal {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 760px) {
        .face-stage {
          width: min(86vw, 460px);
        }

        .pixel-face {
          width: min(62vw, 320px);
          height: min(42vw, 210px);
        }

        .eye {
          width: 40px;
          height: 84px;
          grid-template-columns: repeat(5, 4px);
          grid-auto-rows: 4px;
          gap: 3px;
        }

        .eye-dot {
          width: 4px;
          height: 4px;
        }

        .brow {
          width: 52px;
          height: 16px;
          grid-template-columns: repeat(7, 4px);
          grid-auto-rows: 4px;
          gap: 3px;
        }

        .brow-dot {

        }

        .boot-log {
          top: calc(50% + 33vw);

          max-width: calc(100vw - 24px);

        .boot-kicker {

          height: 5px;
        }

        .boot-status {

        }

        .reveal {

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {

          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }

        .reveal {
          opacity: 1;
          transform: none;
        }
      }
